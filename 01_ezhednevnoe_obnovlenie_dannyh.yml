name: Ежедневное обновление данных

on:
  workflow_dispatch:
  schedule:
    # Каждый день в 05:00 по Москве / 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  obnovlenie-dannyh:
    name: Запустить ежедневное обновление данных
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Europe/Moscow
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
      URL_1C_STOCKS: ${{ secrets.URL_1C_STOCKS }}
      _1C_USER: ${{ secrets._1C_USER }}
      _1C_PASSWORD: ${{ secrets._1C_PASSWORD }}
    steps:
      - name: Скачать код из репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Запустить полное обновление WB
        run: python scripts/ezhednevnoe_obnovlenie_dannyh.py --full --store TOPFACE
