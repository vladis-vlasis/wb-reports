name: Daily TOPFACE report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke / current_week / pdf_only / full_refresh"
        required: true
        default: "current_week"
        type: choice
        options:
          - smoke
          - current_week
          - pdf_only
          - full_refresh
      send_telegram:
        description: "Send generated PDF to Telegram"
        required: true
        default: true
        type: boolean
  schedule:
    # Tue-Sun 12:00 MSK = 09:00 UTC: обновляем только блок текущей недели.
    - cron: "0 9 * * 2-6"
    - cron: "0 9 * * 0"
    # Monday 18:00 MSK = 15:00 UTC: полный пересчет после обновления недельных данных.
    - cron: "0 15 * * 1"

permissions:
  contents: read

concurrency:
  group: wb-report-topface
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

      # Полный режим: ограничиваем самые тяжелые недельные источники.
      WB_MAX_SEARCH_QUERY_FILES: "4"
      WB_MAX_ENTRY_POINT_FILES: "4"
      WB_MAX_STOCK_FILES: "5"

      # PDF policy: спрос WB только через уникальные запросы, без задваивающего fallback.
      PDF_FAIL_ON_MISSING_DEMAND: "0"
      PDF_ALLOW_DEMAND_FALLBACK: "0"

      # Детализация: товар детализируется от 10% ВП категории, внутри товара показываются все артикулы.
      PDF_PRODUCT_DETAIL_MIN_GP_SHARE: "10"
      PDF_FORCE_DETAIL_PRODUCTS: "901,614,617,618,154,155,156,157,158"
      PDF_FORCE_EXCLUDE_PRODUCTS: "206,207,209,210,211"

      PDF_TRACE_SAMPLE_CATEGORY: "Кисти"
      PDF_TRACE_SAMPLE_PRODUCT: "901"
      PDF_TRACE_SAMPLE_ARTICLE: "901/2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        shell: bash
        run: |
          set -euo pipefail
          test -f report_runner.py || { echo "ERROR: report_runner.py is missing"; exit 1; }
          python -m py_compile report_runner.py
          echo "Compile OK"

      - name: Decide mode
        id: mode
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${INPUT_MODE:-pdf_only}"
          elif [ "${{ github.event.schedule }}" = "0 15 * * 1" ]; then
            MODE="full_refresh"
          else
            MODE="current_week"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"

      - name: Run smoke test
        if: steps.mode.outputs.mode == 'smoke'
        shell: bash
        run: python report_runner.py --root . --smoke-test

      - name: Load REPORT_ENV
        if: steps.mode.outputs.mode != 'smoke'
        shell: bash
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
        run: |
          set -euo pipefail
          test -n "${REPORT_ENV:-}" || { echo "ERROR: secret REPORT_ENV is empty or missing"; exit 1; }
          umask 077
          printf '%s\n' "$REPORT_ENV" > .env
          set -a
          source ./.env
          set +a
          test -n "${YC_ACCESS_KEY_ID:-}" || { echo "ERROR: YC_ACCESS_KEY_ID is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_SECRET_ACCESS_KEY:-}" || { echo "ERROR: YC_SECRET_ACCESS_KEY is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_BUCKET_NAME:-}" || { echo "ERROR: YC_BUCKET_NAME is missing in REPORT_ENV"; exit 1; }

      - name: Run current week update
        if: steps.mode.outputs.mode == 'current_week'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          python report_runner.py --root . --current-week-only

      - name: Run PDF only
        if: steps.mode.outputs.mode == 'pdf_only'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          python report_runner.py --root . --pdf-only

      - name: Run full refresh
        if: steps.mode.outputs.mode == 'full_refresh'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          python report_runner.py --root . --full-refresh

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "Отчёты" -maxdepth 5 -type f -print 2>/dev/null || true

      - name: Check Telegram settings
        if: steps.mode.outputs.mode != 'smoke' && (github.event_name != 'workflow_dispatch' || github.event.inputs.send_telegram != 'false')
        shell: bash
        run: |
          set -euo pipefail
          if [ -f ./.env ]; then
            set -a
            source ./.env
            set +a
          fi
          test -n "${TELEGRAM_BOT_TOKEN:-}" || { echo "ERROR: TELEGRAM_BOT_TOKEN is missing. Add it to REPORT_ENV or GitHub Actions secrets."; exit 1; }
          test -n "${TELEGRAM_CHAT_ID:-}" || { echo "ERROR: TELEGRAM_CHAT_ID is missing. Add it to REPORT_ENV or GitHub Actions secrets."; exit 1; }
          echo "Telegram settings OK"

      - name: Send PDF to Telegram
        if: steps.mode.outputs.mode != 'smoke' && (github.event_name != 'workflow_dispatch' || github.event.inputs.send_telegram != 'false')
        shell: bash
        run: |
          set -euo pipefail
          if [ -f ./.env ]; then
            set -a
            source ./.env
            set +a
          fi
          REPORT_DIR="Отчёты/Объединенный отчет/TOPFACE"
          PDF_FILE=""
          if [ -d "$REPORT_DIR" ]; then
            PDF_FILE="$(find "$REPORT_DIR" -maxdepth 1 -type f -name 'Отчет по продажам Влад *.pdf' -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -n 1 | cut -d' ' -f2- || true)"
            if [ -z "$PDF_FILE" ]; then
              PDF_FILE="$(find "$REPORT_DIR" -maxdepth 1 -type f -name '*.pdf' -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -n 1 | cut -d' ' -f2- || true)"
            fi
          fi
          test -n "$PDF_FILE" || { echo "ERROR: PDF file not found in $REPORT_DIR"; find "Отчёты" -maxdepth 5 -type f -print 2>/dev/null || true; exit 1; }
          test -s "$PDF_FILE" || { echo "ERROR: PDF file is empty: $PDF_FILE"; exit 1; }
          echo "Telegram: sending file: $PDF_FILE"
          EXTRA_ARGS=()
          if [ -n "${TELEGRAM_MESSAGE_THREAD_ID:-}" ]; then
            EXTRA_ARGS+=( -F "message_thread_id=${TELEGRAM_MESSAGE_THREAD_ID}" )
          fi
          RESPONSE_FILE="telegram_response.json"
          curl -sS -f -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            "${EXTRA_ARGS[@]}" \
            -F "document=@${PDF_FILE}" \
            -F "caption=$(basename "$PDF_FILE")" \
            -o "$RESPONSE_FILE"
          cat "$RESPONSE_FILE"
          python - <<'PY2'
          import json, sys
          data=json.load(open('telegram_response.json', encoding='utf-8'))
          if not data.get('ok'):
              raise SystemExit('Telegram API returned ok=false: '+json.dumps(data, ensure_ascii=False))
          print('Telegram: sent successfully')
          PY2

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-report-output
          path: |
            Отчёты/**/*.xlsx
            Отчёты/**/*.pdf
            Отчёты/**/*.json
            Отчёты/**/*.txt
          if-no-files-found: warn
          retention-days: 30
