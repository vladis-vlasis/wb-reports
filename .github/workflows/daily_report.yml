name: WB TOPFACE Daily Report

on:
  schedule:
    # GitHub cron is UTC. 22:05 UTC = 01:05 MSK next day.
    # Rule: 00:00-18:59 MSK => report D-2; 19:00-23:59 MSK => report D-1.
    - cron: '5 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим запуска'
        required: true
        default: 'current_week'
        type: choice
        options:
          - current_week
          - full_refresh
          - pdf_only
          - preflight
          - smoke
      send_telegram:
        description: 'Отправить отчет в Telegram'
        required: true
        default: true
        type: boolean
      target_date:
        description: 'Дата отчета YYYY-MM-DD. Пусто = авто по МСК.'
        required: false
        default: ''
        type: string

concurrency:
  group: wb-topface-report-runner
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-report:
    name: Build TOPFACE report
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONUTF8: '1'
      PYTHONIOENCODING: 'utf-8'
      TZ: Europe/Moscow

      # The repository moved credentials into REPORT_ENV. Keep it as the primary source.
      REPORT_ENV_SECRET: ${{ secrets.REPORT_ENV }}
      REPORT_ENV_VAR: ${{ vars.REPORT_ENV }}
      REPORT_ENV_TOPFACE_SECRET: ${{ secrets.REPORT_ENV_TOPFACE }}
      REPORT_ENV_TOPFACE_VAR: ${{ vars.REPORT_ENV_TOPFACE }}
      WB_REPORT_ENV_SECRET: ${{ secrets.WB_REPORT_ENV }}
      WB_REPORT_ENV_VAR: ${{ vars.WB_REPORT_ENV }}
      WB_ENV_SECRET: ${{ secrets.WB_ENV }}
      WB_ENV_VAR: ${{ vars.WB_ENV }}

      # Telegram credentials may also be in REPORT_ENV. These are only direct fallbacks
      # for old working workflow names; values are masked by GitHub/Python before logging.
      TELEGRAM_BOT_TOKEN_SECRET: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TG_BOT_TOKEN_SECRET: ${{ secrets.TG_BOT_TOKEN }}
      TELEGRAM_TOKEN_SECRET: ${{ secrets.TELEGRAM_TOKEN }}
      TG_TOKEN_SECRET: ${{ secrets.TG_TOKEN }}
      BOT_TOKEN_SECRET: ${{ secrets.BOT_TOKEN }}
      WB_TELEGRAM_BOT_TOKEN_SECRET: ${{ secrets.WB_TELEGRAM_BOT_TOKEN }}
      TOPFACE_TELEGRAM_BOT_TOKEN_SECRET: ${{ secrets.TOPFACE_TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_SECRET: ${{ secrets.TELEGRAM_CHAT_ID }}
      TG_CHAT_ID_SECRET: ${{ secrets.TG_CHAT_ID }}
      TELEGRAM_CHAT_SECRET: ${{ secrets.TELEGRAM_CHAT }}
      TG_CHAT_SECRET: ${{ secrets.TG_CHAT }}
      CHAT_ID_SECRET: ${{ secrets.CHAT_ID }}
      WB_TELEGRAM_CHAT_ID_SECRET: ${{ secrets.WB_TELEGRAM_CHAT_ID }}
      TOPFACE_TELEGRAM_CHAT_ID_SECRET: ${{ secrets.TOPFACE_TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID_SECRET: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
      TG_MESSAGE_THREAD_ID_SECRET: ${{ secrets.TG_MESSAGE_THREAD_ID }}
      TELEGRAM_THREAD_ID_SECRET: ${{ secrets.TELEGRAM_THREAD_ID }}
      TG_THREAD_ID_SECRET: ${{ secrets.TG_THREAD_ID }}
      MESSAGE_THREAD_ID_SECRET: ${{ secrets.MESSAGE_THREAD_ID }}
      THREAD_ID_SECRET: ${{ secrets.THREAD_ID }}

      # Fallbacks for individual variables, only if REPORT_ENV is not present.
      FALLBACK_STORAGE_ACCESS_1: ${{ secrets.AWS_ACCESS_KEY_ID }}
      FALLBACK_STORAGE_ACCESS_2: ${{ secrets.S3_ACCESS_KEY_ID }}
      FALLBACK_STORAGE_ACCESS_3: ${{ secrets.ACCESS_KEY_ID }}
      FALLBACK_STORAGE_ACCESS_4: ${{ vars.AWS_ACCESS_KEY_ID }}
      FALLBACK_STORAGE_ACCESS_5: ${{ vars.S3_ACCESS_KEY_ID }}
      FALLBACK_STORAGE_SECRET_1: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      FALLBACK_STORAGE_SECRET_2: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      FALLBACK_STORAGE_SECRET_3: ${{ secrets.SECRET_ACCESS_KEY }}
      FALLBACK_STORAGE_SECRET_4: ${{ vars.AWS_SECRET_ACCESS_KEY }}
      FALLBACK_STORAGE_SECRET_5: ${{ vars.S3_SECRET_ACCESS_KEY }}
      FALLBACK_STORAGE_BUCKET_1: ${{ secrets.S3_BUCKET }}
      FALLBACK_STORAGE_BUCKET_2: ${{ secrets.S3_BUCKET_NAME }}
      FALLBACK_STORAGE_BUCKET_3: ${{ secrets.BUCKET_NAME }}
      FALLBACK_STORAGE_BUCKET_4: ${{ vars.S3_BUCKET }}
      FALLBACK_STORAGE_BUCKET_5: ${{ vars.S3_BUCKET_NAME }}
      FALLBACK_STORAGE_ENDPOINT_1: ${{ secrets.S3_ENDPOINT_URL }}
      FALLBACK_STORAGE_ENDPOINT_2: ${{ vars.S3_ENDPOINT_URL }}

      # Runtime flags. No start-time cancellation; date is resolved below.
      REPORT_RUN_SOURCE: ${{ github.event_name == 'schedule' && 'schedule' || 'manual' }}
      REPORT_ENFORCE_MSK_RUN_WINDOW: '0'
      REPORT_MANUAL_BYPASS_MSK_WINDOW: '1'
      REPORT_AUTO_COMPLETE_DATE: '0'
      REPORT_REQUIRE_ABC_PERIOD: '0'
      REPORT_KEEP_EXPLICIT_DATE: '1'
      WB_KEEP_ONLY_MONDAY_REPORTS: '1'
      WB_LOCALIZATION_MAX_STALE_DAYS: '2'
      ALLOW_LOCAL_STORAGE: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pandas numpy openpyxl boto3 reportlab requests

      - name: Load REPORT_ENV and normalize runtime env
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re

          blob_candidates = [
              'REPORT_ENV_SECRET', 'REPORT_ENV_VAR',
              'REPORT_ENV_TOPFACE_SECRET', 'REPORT_ENV_TOPFACE_VAR',
              'WB_REPORT_ENV_SECRET', 'WB_REPORT_ENV_VAR',
              'WB_ENV_SECRET', 'WB_ENV_VAR',
          ]

          def parse_env_blob(text):
              result = {}
              for raw in (text or '').splitlines():
                  line = raw.strip()
                  if not line or line.startswith('#'):
                      continue
                  if line.startswith('export '):
                      line = line[len('export '):].strip()
                  if '=' not in line:
                      continue
                  key, value = line.split('=', 1)
                  key = key.strip()
                  value = value.strip()
                  if not re.match(r'^[A-Za-z_][A-Za-z0-9_]*$', key):
                      continue
                  if len(value) >= 2 and value[0] == value[-1] and value[0] in {'"', "'"}:
                      value = value[1:-1]
                  result[key] = value
              return result

          source = ''
          parsed = {}
          for candidate in blob_candidates:
              value = os.environ.get(candidate, '')
              if value.strip():
                  source = candidate
                  parsed = parse_env_blob(value)
                  break

          if source:
              print(f'REPORT_ENV source: {source}; loaded variables: {len(parsed)}')
          else:
              print('REPORT_ENV source: MISSING; using individual fallback variables if present')

          env = dict(os.environ)
          env.update(parsed)

          def first(names, default=''):
              for name in names:
                  value = env.get(name, '')
                  if str(value).strip():
                      return str(value).strip(), name
              return default, 'default' if default else ''

          final = dict(parsed)

          storage_access, storage_access_src = first([
              'YC_ACCESS_KEY_ID', 'AWS_ACCESS_KEY_ID', 'S3_ACCESS_KEY_ID', 'ACCESS_KEY_ID',
              'YANDEX_ACCESS_KEY_ID', 'YANDEX_STORAGE_ACCESS_KEY_ID', 'OBJECT_STORAGE_ACCESS_KEY_ID',
              'FALLBACK_STORAGE_ACCESS_1', 'FALLBACK_STORAGE_ACCESS_2', 'FALLBACK_STORAGE_ACCESS_3',
              'FALLBACK_STORAGE_ACCESS_4', 'FALLBACK_STORAGE_ACCESS_5',
          ])
          storage_secret, storage_secret_src = first([
              'YC_SECRET_ACCESS_KEY', 'AWS_SECRET_ACCESS_KEY', 'S3_SECRET_ACCESS_KEY', 'SECRET_ACCESS_KEY',
              'YANDEX_SECRET_ACCESS_KEY', 'YANDEX_STORAGE_SECRET_ACCESS_KEY', 'OBJECT_STORAGE_SECRET_ACCESS_KEY',
              'FALLBACK_STORAGE_SECRET_1', 'FALLBACK_STORAGE_SECRET_2', 'FALLBACK_STORAGE_SECRET_3',
              'FALLBACK_STORAGE_SECRET_4', 'FALLBACK_STORAGE_SECRET_5',
          ])
          storage_bucket, storage_bucket_src = first([
              'YC_BUCKET_NAME', 'YC_BUCKET', 'S3_BUCKET', 'S3_BUCKET_NAME', 'BUCKET_NAME', 'BUCKET',
              'YANDEX_BUCKET_NAME', 'YANDEX_STORAGE_BUCKET', 'OBJECT_STORAGE_BUCKET',
              'FALLBACK_STORAGE_BUCKET_1', 'FALLBACK_STORAGE_BUCKET_2', 'FALLBACK_STORAGE_BUCKET_3',
              'FALLBACK_STORAGE_BUCKET_4', 'FALLBACK_STORAGE_BUCKET_5',
          ], default='wb-analis')
          storage_endpoint, storage_endpoint_src = first([
              'YC_ENDPOINT_URL', 'S3_ENDPOINT_URL', 'AWS_ENDPOINT_URL', 'YANDEX_ENDPOINT_URL',
              'YANDEX_STORAGE_ENDPOINT_URL', 'OBJECT_STORAGE_ENDPOINT_URL',
              'FALLBACK_STORAGE_ENDPOINT_1', 'FALLBACK_STORAGE_ENDPOINT_2',
          ], default='https://storage.yandexcloud.net')

          telegram_token, telegram_token_src = first([
              'TELEGRAM_BOT_TOKEN', 'TG_BOT_TOKEN', 'TELEGRAM_TOKEN', 'TG_TOKEN', 'BOT_TOKEN',
              'WB_TELEGRAM_BOT_TOKEN', 'TOPFACE_TELEGRAM_BOT_TOKEN',
              'TELEGRAM_BOT_TOKEN_TOPFACE', 'TELEGRAM_TOPFACE_BOT_TOKEN', 'TG_TOPFACE_BOT_TOKEN',
              'TELEGRAM_BOT_TOKEN_SECRET', 'TG_BOT_TOKEN_SECRET', 'TELEGRAM_TOKEN_SECRET',
              'TG_TOKEN_SECRET', 'BOT_TOKEN_SECRET', 'WB_TELEGRAM_BOT_TOKEN_SECRET',
              'TOPFACE_TELEGRAM_BOT_TOKEN_SECRET',
          ])
          telegram_chat, telegram_chat_src = first([
              'TELEGRAM_CHAT_ID', 'TG_CHAT_ID', 'TELEGRAM_CHAT', 'TG_CHAT', 'CHAT_ID',
              'WB_TELEGRAM_CHAT_ID', 'TOPFACE_TELEGRAM_CHAT_ID',
              'TELEGRAM_CHAT_ID_TOPFACE', 'TELEGRAM_TOPFACE_CHAT_ID', 'TG_TOPFACE_CHAT_ID',
              'TELEGRAM_CHAT_ID_SECRET', 'TG_CHAT_ID_SECRET', 'TELEGRAM_CHAT_SECRET',
              'TG_CHAT_SECRET', 'CHAT_ID_SECRET', 'WB_TELEGRAM_CHAT_ID_SECRET',
              'TOPFACE_TELEGRAM_CHAT_ID_SECRET',
          ])
          telegram_thread, telegram_thread_src = first([
              'TELEGRAM_MESSAGE_THREAD_ID', 'TELEGRAM_THREAD_ID', 'TG_MESSAGE_THREAD_ID',
              'TG_THREAD_ID', 'MESSAGE_THREAD_ID', 'THREAD_ID',
              'TELEGRAM_MESSAGE_THREAD_ID_SECRET', 'TG_MESSAGE_THREAD_ID_SECRET',
              'TELEGRAM_THREAD_ID_SECRET', 'TG_THREAD_ID_SECRET',
              'MESSAGE_THREAD_ID_SECRET', 'THREAD_ID_SECRET',
          ])

          # Canonical names required by old report_runner.py.
          final['YC_ACCESS_KEY_ID'] = storage_access
          final['YC_SECRET_ACCESS_KEY'] = storage_secret
          final['YC_BUCKET_NAME'] = storage_bucket
          final['YC_ENDPOINT_URL'] = storage_endpoint
          if telegram_token:
              final['TELEGRAM_BOT_TOKEN'] = telegram_token
          if telegram_chat:
              final['TELEGRAM_CHAT_ID'] = telegram_chat
          if telegram_thread:
              final['TELEGRAM_MESSAGE_THREAD_ID'] = telegram_thread

          # Keep AWS/S3 aliases too for newer code variants.
          if storage_access:
              final.setdefault('AWS_ACCESS_KEY_ID', storage_access)
              final.setdefault('S3_ACCESS_KEY_ID', storage_access)
          if storage_secret:
              final.setdefault('AWS_SECRET_ACCESS_KEY', storage_secret)
              final.setdefault('S3_SECRET_ACCESS_KEY', storage_secret)
          if storage_bucket:
              final.setdefault('S3_BUCKET', storage_bucket)
              final.setdefault('S3_BUCKET_NAME', storage_bucket)
          if storage_endpoint:
              final.setdefault('S3_ENDPOINT_URL', storage_endpoint)

          github_env = os.environ['GITHUB_ENV']
          sensitive_re = re.compile(r'(KEY|SECRET|TOKEN|PASSWORD|PASS|CHAT_ID|THREAD_ID)', re.I)
          with open(github_env, 'a', encoding='utf-8') as f:
              for key, value in final.items():
                  if value is None:
                      continue
                  value = str(value)
                  if value == '':
                      continue
                  if sensitive_re.search(key):
                      print(f'::add-mask::{value}')
                  f.write(f'{key}<<__{key}__\n{value}\n__{key}__\n')

          print(f'Object Storage access: {"OK" if storage_access else "MISSING"} ({storage_access_src or "-"})')
          print(f'Object Storage secret: {"OK" if storage_secret else "MISSING"} ({storage_secret_src or "-"})')
          print(f'Object Storage bucket: OK ({storage_bucket_src})')
          print(f'Object Storage endpoint: OK ({storage_endpoint_src})')
          print(f'Telegram token: {"OK" if telegram_token else "MISSING"} ({telegram_token_src or "-"})')
          print(f'Telegram chat: {"OK" if telegram_chat else "MISSING"} ({telegram_chat_src or "-"})')
          print(f'Telegram thread: {"OK" if telegram_thread else "not set"} ({telegram_thread_src or "-"})')

          if not storage_access or not storage_secret:
              raise SystemExit(
                  'Object Storage credentials are not available. Expected them in REPORT_ENV first. '
                  'No individual fallback variable provided either.'
              )
          PY

      - name: Resolve report date by MSK rule
        env:
          MANUAL_TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          import re

          manual = os.environ.get('MANUAL_TARGET_DATE', '').strip()
          if manual:
              if not re.match(r'^\d{4}-\d{2}-\d{2}$', manual):
                  raise SystemExit(f'target_date must be YYYY-MM-DD, got: {manual}')
              target = manual
              reason = 'manual target_date'
              now_text = '-'
          else:
              now = datetime.now(ZoneInfo('Europe/Moscow'))
              shift = 2 if now.hour < 19 else 1
              target = (now.date() - timedelta(days=shift)).isoformat()
              reason = 'MSK 00:00-18:59=>D-2, 19:00-23:59=>D-1'
              now_text = now.strftime('%Y-%m-%d %H:%M:%S')

          values = {
              'REPORT_AS_OF_DATE': target,
              'REPORT_REQUIRE_DATA_DATE': target,
              'REPORT_REQUIRE_ADS_DATE': target,
              'REPORT_REQUIRE_DAILY_ABC_DATE': target,
              'WB_DAILY_TARGET_DATE': target,
              'REPORT_MANUAL_TARGET_DATE': target,
              'REPORT_KEEP_EXPLICIT_DATE': '1',
              'REPORT_DATE_LOCKED_BY_MSK_WINDOW': '1',
          }
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              for key, value in values.items():
                  f.write(f'{key}={value}\n')
          print(f'Report date: {target}; now_msk={now_text}; reason={reason}')
          PY

      - name: Diagnostics
        run: |
          set -euo pipefail
          echo "GitHub event: ${GITHUB_EVENT_NAME}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "MSK now: $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M:%S')"
          echo "REPORT_RUN_SOURCE=${REPORT_RUN_SOURCE}"
          echo "REPORT_AS_OF_DATE=${REPORT_AS_OF_DATE}"
          python --version
          test -f report_runner.py
          python -m py_compile report_runner.py

      - name: Preflight Object Storage list
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import boto3
          bucket = os.environ['YC_BUCKET_NAME']
          endpoint = os.environ.get('YC_ENDPOINT_URL') or 'https://storage.yandexcloud.net'
          s3 = boto3.client(
              's3',
              endpoint_url=endpoint,
              aws_access_key_id=os.environ['YC_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['YC_SECRET_ACCESS_KEY'],
          )
          resp = s3.list_objects_v2(Bucket=bucket, Prefix='Отчёты/', MaxKeys=3)
          print(f'Object Storage OK: bucket={bucket}, prefix=Отчёты/, objects_seen={len(resp.get("Contents", []))}')
          PY

      - name: Preflight Telegram variables
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'current_week' }}
          SEND_TELEGRAM_INPUT: ${{ github.event.inputs.send_telegram || 'true' }}
        run: |
          set -euo pipefail
          if [ "${SEND_TELEGRAM_INPUT}" != "true" ] || [ "${RUN_MODE}" = "smoke" ] || [ "${RUN_MODE}" = "preflight" ]; then
            echo "Telegram preflight skipped: send_telegram=${SEND_TELEGRAM_INPUT}, mode=${RUN_MODE}"
            exit 0
          fi
          missing=0
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "Telegram token: MISSING"
            missing=1
          else
            echo "Telegram token: OK"
          fi
          if [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram chat: MISSING"
            missing=1
          else
            echo "Telegram chat: OK"
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Telegram delivery was requested, but credentials are not available after REPORT_ENV normalization."
            echo "Failing now before heavy report calculations."
            exit 1
          fi

      - name: Run report
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'current_week' }}
          SEND_TELEGRAM_INPUT: ${{ github.event.inputs.send_telegram || 'true' }}
        run: |
          set -euo pipefail

          echo "Run mode: ${RUN_MODE}"
          echo "Send Telegram: ${SEND_TELEGRAM_INPUT}"

          ARGS=(--root "." --reports-root "Отчёты" --store "TOPFACE")

          case "${RUN_MODE}" in
            current_week)
              export WB_CURRENT_WEEK_ONLY="1"
              ARGS+=(--current-week-only)
              ;;
            full_refresh)
              export WB_CURRENT_WEEK_ONLY="0"
              ARGS+=(--full-refresh)
              ;;
            pdf_only)
              export WB_CURRENT_WEEK_ONLY="1"
              ARGS+=(--pdf-only)
              ;;
            preflight)
              export WB_CURRENT_WEEK_ONLY="1"
              ARGS+=(--preflight-date-check)
              ;;
            smoke)
              export WB_CURRENT_WEEK_ONLY="0"
              ARGS+=(--smoke-test)
              ;;
            *)
              echo "Unknown RUN_MODE=${RUN_MODE}"
              exit 2
              ;;
          esac

          if [ "${SEND_TELEGRAM_INPUT}" = "true" ] && [ "${RUN_MODE}" != "smoke" ] && [ "${RUN_MODE}" != "preflight" ]; then
            ARGS+=(--send-telegram)
          fi

          echo "Running: python report_runner.py ${ARGS[*]}"
          python report_runner.py "${ARGS[@]}"
