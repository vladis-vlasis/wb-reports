name: Daily TOPFACE report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke / current_week / pdf_only / full_refresh"
        required: true
        default: "pdf_only"
        type: choice
        options:
          - smoke
          - current_week
          - pdf_only
          - full_refresh
      send_telegram:
        description: "Send generated PDF to Telegram"
        required: true
        default: true
        type: boolean
      as_of_date:
        description: "Дата отчёта YYYY-MM-DD. Для full_refresh пусто = последнее воскресенье по МСК"
        required: false
        default: ""
        type: string
  schedule:
    # Tue-Sun 13:50 MSK = 10:50 UTC: обновляем только блок текущей недели.
    - cron: "50 10 * * 2-6"
    - cron: "50 10 * * 0"
    # Monday 13:50 MSK = 10:50 UTC: полный пересчёт закрытой прошлой недели после ABC.
    - cron: "50 10 * * 1"

permissions:
  contents: read

concurrency:
  group: wb-report-topface
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      TZ: Europe/Moscow
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

      # Полный режим: ограничиваем самые тяжелые недельные источники.
      WB_MAX_SEARCH_QUERY_FILES: "4"
      WB_MAX_ENTRY_POINT_FILES: "4"
      WB_MAX_STOCK_FILES: "5"

      # PDF policy: спрос WB только через уникальные запросы, без задваивающего fallback.
      PDF_FAIL_ON_MISSING_DEMAND: "0"
      PDF_ALLOW_DEMAND_FALLBACK: "0"

      # Детализация: товар детализируется от 10% ВП категории, внутри товара показываются все артикулы.
      PDF_PRODUCT_DETAIL_MIN_GP_SHARE: "10"
      PDF_FORCE_DETAIL_PRODUCTS: "901,614,617,618,154,155,156,157,158"
      PDF_FORCE_EXCLUDE_PRODUCTS: "206,207,209,210,211"

      PDF_TRACE_SAMPLE_CATEGORY: "Кисти"
      PDF_TRACE_SAMPLE_PRODUCT: "901"
      PDF_TRACE_SAMPLE_ARTICLE: "901/2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install requests boto3 openpyxl pandas numpy reportlab

      - name: Compile check
        shell: bash
        run: |
          set -euo pipefail
          test -f report_runner.py || { echo "ERROR: report_runner.py is missing"; exit 1; }
          python -m py_compile report_runner.py
          echo "Compile OK"

      - name: Decide mode
        id: mode
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_SEND_TELEGRAM: ${{ github.event.inputs.send_telegram }}
          INPUT_AS_OF_DATE: ${{ github.event.inputs.as_of_date }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${INPUT_MODE:-pdf_only}"
            SEND_TELEGRAM="${INPUT_SEND_TELEGRAM:-true}"
          elif [ "${{ github.event.schedule }}" = "50 10 * * 1" ]; then
            MODE="full_refresh"
            SEND_TELEGRAM="true"
          else
            MODE="current_week"
            SEND_TELEGRAM="true"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "send_telegram=$SEND_TELEGRAM" >> "$GITHUB_OUTPUT"
          echo "as_of_date=${INPUT_AS_OF_DATE:-}" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"
          echo "Send Telegram: $SEND_TELEGRAM"
          echo "Manual as_of_date: ${INPUT_AS_OF_DATE:-}"

      - name: Run smoke test
        if: steps.mode.outputs.mode == 'smoke'
        shell: bash
        run: python report_runner.py --root . --smoke-test

      - name: Load REPORT_ENV
        if: steps.mode.outputs.mode != 'smoke'
        shell: bash
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
        run: |
          set -euo pipefail
          test -n "${REPORT_ENV:-}" || { echo "ERROR: secret REPORT_ENV is empty or missing"; exit 1; }
          umask 077
          printf '%s\n' "$REPORT_ENV" > .env
          set -a
          source ./.env
          set +a
          test -n "${YC_ACCESS_KEY_ID:-}" || { echo "ERROR: YC_ACCESS_KEY_ID is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_SECRET_ACCESS_KEY:-}" || { echo "ERROR: YC_SECRET_ACCESS_KEY is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_BUCKET_NAME:-}" || { echo "ERROR: YC_BUCKET_NAME is missing in REPORT_ENV"; exit 1; }

      - name: Run current week update
        if: steps.mode.outputs.mode == 'current_week'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          TG_FLAG=""
          if [ "${{ steps.mode.outputs.send_telegram }}" = "true" ]; then TG_FLAG="--send-telegram"; fi
          python report_runner.py --root . --current-week-only $TG_FLAG

      - name: Run PDF only
        if: steps.mode.outputs.mode == 'pdf_only'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          TG_FLAG=""
          if [ "${{ steps.mode.outputs.send_telegram }}" = "true" ]; then TG_FLAG="--send-telegram"; fi
          python report_runner.py --root . --pdf-only $TG_FLAG

      - name: Run full refresh
        if: steps.mode.outputs.mode == 'full_refresh'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          TG_FLAG=""
          if [ "${{ steps.mode.outputs.send_telegram }}" = "true" ]; then TG_FLAG="--send-telegram"; fi

          # Понедельничный полный отчёт: берём последнюю закрытую неделю.
          # Пример: запуск 2026-06-01 => REPORT_AS_OF_DATE=2026-05-31 => неделя 25.05-31.05.
          INPUT_AS_OF_DATE="${{ steps.mode.outputs.as_of_date }}"
          if [ -n "${INPUT_AS_OF_DATE:-}" ]; then
            REPORT_AS_OF_DATE="$INPUT_AS_OF_DATE"
          else
            REPORT_AS_OF_DATE="$(TZ=Europe/Moscow date -d 'last sunday' +%F)"
          fi

          REPORT_REQUIRE_DATA_DATE="$REPORT_AS_OF_DATE"
          REPORT_CLOSED_WEEK_AS_PREVIOUS="1"

          export REPORT_AS_OF_DATE
          export REPORT_REQUIRE_DATA_DATE
          export REPORT_CLOSED_WEEK_AS_PREVIOUS

          echo "REPORT_AS_OF_DATE=$REPORT_AS_OF_DATE"
          echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
          echo "REPORT_CLOSED_WEEK_AS_PREVIOUS=$REPORT_CLOSED_WEEK_AS_PREVIOUS"

          python report_runner.py --root . --full-refresh $TG_FLAG

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "Отчёты" -maxdepth 5 -type f -print 2>/dev/null || true

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-report-output
          path: |
            Отчёты/**/*.xlsx
            Отчёты/**/*.pdf
            Отчёты/**/*.json
            Отчёты/**/*.txt
          if-no-files-found: warn
          retention-days: 30
