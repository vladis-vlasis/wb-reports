name: Daily report PDF only

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "pdf_only = пересобрать только PDF; smoke = быстрый тест; s3_only = полный пересчет без Telegram"
        required: true
        default: "pdf_only"
        type: choice
        options:
          - pdf_only
          - smoke
          - s3_only
  schedule:
    # 06:17 Moscow time = 03:17 UTC. By default schedule runs pdf_only.
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"

      # Fast defaults for full rebuild mode. PDF-only does not read raw weekly search/stock files.
      WB_MAX_SEARCH_QUERY_FILES: "4"
      WB_MAX_ENTRY_POINT_FILES: "4"
      WB_MAX_STOCK_FILES: "5"

      # PDF demand policy: do not use duplicated demand fallback and do not crash late.
      PDF_FAIL_ON_MISSING_DEMAND: "0"
      PDF_ALLOW_DEMAND_FALLBACK: "0"

      PDF_TRACE_SAMPLE_CATEGORY: "Кисти"
      PDF_TRACE_SAMPLE_PRODUCT: "901"
      PDF_TRACE_SAMPLE_ARTICLE: ""
      PDF_DETAIL_MIN_ORDER_SUM: "5000"
      PDF_DETAIL_MIN_GP: "1000"
      PDF_MIN_PRODUCT_GP_SHARE_PCT: "1.0"
      PDF_MIN_PRODUCT_CURRENT_WEEK_GP: "1000"
      PDF_MIN_PRODUCT_CURRENT_WEEK_ORDER_SUM: "10000"
      PDF_FORCE_INCLUDE_PRODUCTS: "901,605,611,613,614,617,618,154,155,156,157"
      PDF_FORCE_EXCLUDE_PRODUCTS: "206,207,209,210,211"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check repository files
        shell: bash
        run: |
          set -euo pipefail
          pwd
          ls -la
          test -f report_runner.py || { echo "ERROR: report_runner.py is missing in repository root"; exit 1; }
          python -m py_compile report_runner.py
          echo "Compile OK"

      - name: Run report
        shell: bash
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          MODE="${INPUT_MODE:-pdf_only}"
          if [ "$MODE" = "" ]; then MODE="pdf_only"; fi
          echo "Run mode: $MODE"

          if [ "$MODE" = "smoke" ]; then
            python report_runner.py --root . --smoke-test
            exit 0
          fi

          test -n "${REPORT_ENV:-}" || { echo "ERROR: secret REPORT_ENV is empty or missing"; exit 1; }
          umask 077
          printf '%s\n' "$REPORT_ENV" > .env
          set -a
          source ./.env
          set +a
          test -n "${YC_ACCESS_KEY_ID:-}" || { echo "ERROR: YC_ACCESS_KEY_ID is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_SECRET_ACCESS_KEY:-}" || { echo "ERROR: YC_SECRET_ACCESS_KEY is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_BUCKET_NAME:-}" || { echo "ERROR: YC_BUCKET_NAME is missing in REPORT_ENV"; exit 1; }

          if [ "$MODE" = "pdf_only" ]; then
            python report_runner.py --root . --pdf-only
          elif [ "$MODE" = "s3_only" ]; then
            python report_runner.py --root .
          else
            echo "ERROR: unknown mode: $MODE"
            exit 1
          fi

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "Generated report files:"
          find "Отчёты" -maxdepth 5 -type f -print 2>/dev/null || true

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-only-report-output
          path: |
            Отчёты/**/*.xlsx
            Отчёты/**/*.pdf
            Отчёты/**/*.json
            Отчёты/**/*.txt
          if-no-files-found: warn
          retention-days: 30
