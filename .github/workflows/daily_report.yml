# VERSION: TOPFACE_WORKFLOW_ORDERS_ONLY_TG_REPORTLAB_20260527_1058
name: TOPFACE orders-only TG 20260527-1058

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke / current_week / full_refresh"
        required: true
        default: "current_week"
        type: choice
        options:
          - smoke
          - current_week
          - full_refresh
      send_telegram:
        description: "Send generated PDF to Telegram"
        required: true
        default: true
        type: boolean
  schedule:
    # Tue-Sun 12:00 MSK = 09:00 UTC: current-week update.
    - cron: "0 9 * * 2-6"
    - cron: "0 9 * * 0"
    # Monday 18:00 MSK = 15:00 UTC: full refresh after weekly data is available.
    - cron: "0 15 * * 1"

permissions:
  contents: read

concurrency:
  group: wb-report-topface-orders-only-20260527-1058
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      REPORT_SCRIPT: "report_runner_orders_only_tg_20260527_1058.py"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

      WB_MAX_SEARCH_QUERY_FILES: "4"
      WB_MAX_ENTRY_POINT_FILES: "4"
      WB_MAX_STOCK_FILES: "5"

      PDF_FAIL_ON_MISSING_DEMAND: "0"
      PDF_ALLOW_DEMAND_FALLBACK: "0"
      PDF_PRODUCT_DETAIL_MIN_GP_SHARE: "10"
      PDF_FORCE_DETAIL_PRODUCTS: "901,614,617,618,154,155,156,157,158"
      PDF_FORCE_EXCLUDE_PRODUCTS: "206,207,209,210,211"
      PDF_TRACE_SAMPLE_CATEGORY: "Кисти"
      PDF_TRACE_SAMPLE_PRODUCT: "901"
      PDF_TRACE_SAMPLE_ARTICLE: "901/2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install reportlab

      - name: Validate report script file
        shell: bash
        run: |
          set -euo pipefail
          test -f "$REPORT_SCRIPT" || { echo "ERROR: $REPORT_SCRIPT is missing in repository root"; exit 1; }
          echo "Using report script: $REPORT_SCRIPT"
          head -5 "$REPORT_SCRIPT"
          grep -q "# VERSION: ORDERS_ONLY_AND_TG_YAML_FIX_20260527" "$REPORT_SCRIPT" || { echo "ERROR: wrong report script version"; exit 1; }
          if grep -nE "^(umask|set -euo pipefail|name: TOPFACE|on:)" "$REPORT_SCRIPT"; then
            echo "ERROR: workflow/shell text was pasted into the Python report script"
            exit 1
          fi
          python -m py_compile "$REPORT_SCRIPT"
          echo "Compile OK"

      - name: Decide mode
        id: mode
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_SEND_TELEGRAM: ${{ github.event.inputs.send_telegram }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${INPUT_MODE:-current_week}"
            SEND_TELEGRAM="${INPUT_SEND_TELEGRAM:-true}"
          elif [ "${{ github.event.schedule }}" = "0 15 * * 1" ]; then
            MODE="full_refresh"
            SEND_TELEGRAM="true"
          else
            MODE="current_week"
            SEND_TELEGRAM="true"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "send_telegram=$SEND_TELEGRAM" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"
          echo "Send Telegram: $SEND_TELEGRAM"

      - name: Run smoke test
        if: steps.mode.outputs.mode == 'smoke'
        shell: bash
        run: python "$REPORT_SCRIPT" --root . --smoke-test

      - name: Load REPORT_ENV
        if: steps.mode.outputs.mode != 'smoke'
        shell: bash
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
        run: |
          set -euo pipefail
          test -n "${REPORT_ENV:-}" || { echo "ERROR: secret REPORT_ENV is empty or missing"; exit 1; }
          umask 077
          printf '%s\n' "$REPORT_ENV" > .env
          set -a
          source ./.env
          set +a
          test -n "${YC_ACCESS_KEY_ID:-}" || { echo "ERROR: YC_ACCESS_KEY_ID is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_SECRET_ACCESS_KEY:-}" || { echo "ERROR: YC_SECRET_ACCESS_KEY is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_BUCKET_NAME:-}" || { echo "ERROR: YC_BUCKET_NAME is missing in REPORT_ENV"; exit 1; }

      - name: Check Telegram settings
        if: ${{ steps.mode.outputs.mode != 'smoke' && steps.mode.outputs.send_telegram == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          PRE_TG_TOKEN="${TELEGRAM_BOT_TOKEN:-}"
          PRE_TG_CHAT="${TELEGRAM_CHAT_ID:-}"
          PRE_TG_THREAD="${TELEGRAM_MESSAGE_THREAD_ID:-}"
          if [ -f ./.env ]; then
            set -a
            source ./.env
            set +a
          fi
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "$PRE_TG_TOKEN" ]; then export TELEGRAM_BOT_TOKEN="$PRE_TG_TOKEN"; fi
          if [ -z "${TELEGRAM_CHAT_ID:-}" ] && [ -n "$PRE_TG_CHAT" ]; then export TELEGRAM_CHAT_ID="$PRE_TG_CHAT"; fi
          if [ -z "${TELEGRAM_MESSAGE_THREAD_ID:-}" ] && [ -n "$PRE_TG_THREAD" ]; then export TELEGRAM_MESSAGE_THREAD_ID="$PRE_TG_THREAD"; fi
          test -n "${TELEGRAM_BOT_TOKEN:-}" || { echo "ERROR: TELEGRAM_BOT_TOKEN is missing"; exit 1; }
          test -n "${TELEGRAM_CHAT_ID:-}" || { echo "ERROR: TELEGRAM_CHAT_ID is missing"; exit 1; }
          echo "Telegram settings OK"

      - name: Run current week update
        if: steps.mode.outputs.mode == 'current_week'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          python "$REPORT_SCRIPT" --root . --current-week-only

      - name: Run full refresh
        if: steps.mode.outputs.mode == 'full_refresh'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          python "$REPORT_SCRIPT" --root . --full-refresh

      - name: Send PDF to Telegram
        if: ${{ steps.mode.outputs.mode != 'smoke' && steps.mode.outputs.send_telegram == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          PRE_TG_TOKEN="${TELEGRAM_BOT_TOKEN:-}"
          PRE_TG_CHAT="${TELEGRAM_CHAT_ID:-}"
          PRE_TG_THREAD="${TELEGRAM_MESSAGE_THREAD_ID:-}"
          if [ -f ./.env ]; then
            set -a
            source ./.env
            set +a
          fi
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "$PRE_TG_TOKEN" ]; then export TELEGRAM_BOT_TOKEN="$PRE_TG_TOKEN"; fi
          if [ -z "${TELEGRAM_CHAT_ID:-}" ] && [ -n "$PRE_TG_CHAT" ]; then export TELEGRAM_CHAT_ID="$PRE_TG_CHAT"; fi
          if [ -z "${TELEGRAM_MESSAGE_THREAD_ID:-}" ] && [ -n "$PRE_TG_THREAD" ]; then export TELEGRAM_MESSAGE_THREAD_ID="$PRE_TG_THREAD"; fi

          REPORT_DIR="Отчёты/Объединенный отчет/TOPFACE"
          PDF_FILE="$(find "$REPORT_DIR" -maxdepth 1 -type f -name 'Отчет по продажам Влад *.pdf' -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2-)"
          if [ -z "$PDF_FILE" ]; then
            PDF_FILE="$(find "$REPORT_DIR" -maxdepth 1 -type f -name '*.pdf' -printf '%T@ %p\n' 2>/dev/null | sort -nr | head -1 | cut -d' ' -f2-)"
          fi
          test -n "$PDF_FILE" || { echo "ERROR: PDF file not found in $REPORT_DIR"; exit 1; }
          test -s "$PDF_FILE" || { echo "ERROR: PDF file is empty: $PDF_FILE"; exit 1; }

          CAPTION="$(basename "$PDF_FILE" .pdf)"
          echo "Telegram: sending file: $PDF_FILE"
          CURL_ARGS=(
            -sS -f
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
            -F "chat_id=${TELEGRAM_CHAT_ID}"
            -F "caption=${CAPTION}"
            -F "document=@${PDF_FILE}"
          )
          if [ -n "${TELEGRAM_MESSAGE_THREAD_ID:-}" ]; then
            CURL_ARGS+=(-F "message_thread_id=${TELEGRAM_MESSAGE_THREAD_ID}")
          fi
          curl "${CURL_ARGS[@]}"
          echo
          echo "Telegram: sent successfully"

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "Отчёты" -maxdepth 5 -type f -print 2>/dev/null || true

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-report-output-20260527-1058
          path: |
            Отчёты/**/*.xlsx
            Отчёты/**/*.pdf
            Отчёты/**/*.json
            Отчёты/**/*.txt
          if-no-files-found: warn
          retention-days: 30
