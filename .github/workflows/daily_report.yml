name: Daily TOPFACE sales report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим запуска"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - smoke
          - current_week
          - full_refresh
      send_telegram:
        description: "Отправлять в Telegram"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      report_as_of_date:
        description: "YYYY-MM-DD только для ручного full_refresh. Пусто = последнее закрытое воскресенье"
        required: false
        default: ""
        type: string
      require_data_date:
        description: "YYYY-MM-DD только для ручного full_refresh. Пусто = report_as_of_date"
        required: false
        default: ""
        type: string

  schedule:
    # План: PDF должен приходить около 15:00 по Москве.
    # GitHub cron указывается в UTC. 11:35 UTC = 14:35 МСК.
    # Отчёт обычно считается 15-25 минут, поэтому запуск ставим заранее.
    - cron: "35 11 * * *"

permissions:
  contents: read

concurrency:
  group: daily-topface-sales-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      REPORT_SCRIPT: report_runner.py
      EXPECTED_VERSION: ORDERS_ONLY_TG_FIX26_ABC_DEDUPE_GP_MONTH_AVG_ADS_20260602

      WB_STORE: TOPFACE
      REPORT_STORE: TOPFACE
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"

      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ENDPOINT_URL: ${{ secrets.YC_ENDPOINT_URL }}

      # Эти имена должны совпадать с тем, что читает report_runner.py.
      # Ошибка FIX32 была в том, что workflow передавал TELEGRAM_*_SECRET,
      # а Python искал TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID.
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

      # Дублируем старые имена только как fallback, если они уже были заведены в secrets.
      TELEGRAM_BOT_TOKEN_SECRET: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_SECRET: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID_SECRET: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

      WB_MAX_SEARCH_QUERY_FILES: "4"
      WB_MAX_ENTRY_POINT_FILES: "4"
      WB_MAX_STOCK_FILES: "5"

      PDF_FAIL_ON_MISSING_DEMAND: "0"
      PDF_ALLOW_DEMAND_FALLBACK: "0"
      PDF_PRODUCT_DETAIL_MIN_GP_SHARE: "10"
      PDF_FORCE_DETAIL_PRODUCTS: "901,614,617,618,154,155,156,157,158"
      PDF_FORCE_EXCLUDE_PRODUCTS: "206,207,209,210,211"
      PDF_TRACE_SAMPLE_CATEGORY: "Кисти"
      PDF_TRACE_SAMPLE_PRODUCT: "901"
      PDF_TRACE_SAMPLE_ARTICLE: "901/2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show trigger time
        shell: bash
        run: |
          set -euo pipefail
          echo "Event: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "MSK now: $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M:%S')"
          echo "Planned cron: 35 11 * * * = 14:35 MSK start, expected PDF around 15:00 MSK"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install reportlab

      - name: Validate report script
        shell: bash
        run: |
          set -euo pipefail

          test -f "$REPORT_SCRIPT" || { echo "ERROR: $REPORT_SCRIPT is missing in repository root"; exit 1; }

          echo "Using report script: $REPORT_SCRIPT"
          head -n 8 "$REPORT_SCRIPT"

          if ! grep -q "$EXPECTED_VERSION" "$REPORT_SCRIPT"; then
            echo "ERROR: wrong report script version. Expected $EXPECTED_VERSION"
            exit 1
          fi

          if grep -nE "^(name:|on:|jobs:|steps:|set -euo pipefail)" "$REPORT_SCRIPT"; then
            echo "ERROR: workflow/shell text was pasted into report_runner.py"
            exit 1
          fi

          python -m py_compile "$REPORT_SCRIPT"
          echo "report_runner.py compile OK"

      - name: Write REPORT_ENV to .env
        shell: bash
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
        run: |
          set -euo pipefail

          umask 077
          : > .env

          if [ -n "${REPORT_ENV:-}" ]; then
            printf '%s\n' "$REPORT_ENV" | sed 's/\r$//' > .env
            echo "REPORT_ENV written to .env"
          else
            echo "REPORT_ENV is empty; will use separate GitHub secrets if they exist"
          fi

      - name: Decide mode and dates
        id: decide
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_SEND_TELEGRAM: ${{ github.event.inputs.send_telegram }}
          INPUT_REPORT_AS_OF_DATE: ${{ github.event.inputs.report_as_of_date }}
          INPUT_REQUIRE_DATA_DATE: ${{ github.event.inputs.require_data_date }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            SEND_TELEGRAM="true"
            MSK_DOW="$(python -c 'from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo("Europe/Moscow")).isoweekday())')"

            if [ "$MSK_DOW" = "1" ]; then
              MODE="full_refresh"
            else
              MODE="current_week"
            fi
          else
            MODE="${INPUT_MODE:-auto}"
            SEND_TELEGRAM="${INPUT_SEND_TELEGRAM:-true}"

            if [ "$MODE" = "auto" ]; then
              MSK_DOW="$(python -c 'from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo("Europe/Moscow")).isoweekday())')"

              if [ "$MSK_DOW" = "1" ]; then
                MODE="full_refresh"
              else
                MODE="current_week"
              fi
            fi
          fi

          if [ "$MODE" = "full_refresh" ]; then
            if [ -n "${INPUT_REPORT_AS_OF_DATE:-}" ]; then
              AS_OF_DATE="$INPUT_REPORT_AS_OF_DATE"
            else
              AS_OF_DATE="$(python -c 'from datetime import datetime, timedelta; from zoneinfo import ZoneInfo; today = datetime.now(ZoneInfo("Europe/Moscow")).date(); print((today - timedelta(days=today.isoweekday())).isoformat())')"
            fi

            if [ -n "${INPUT_REQUIRE_DATA_DATE:-}" ]; then
              REQUIRE_DATE="$INPUT_REQUIRE_DATA_DATE"
            else
              REQUIRE_DATE="$AS_OF_DATE"
            fi

            REPORT_CLOSED_WEEK_AS_PREVIOUS="1"
            REPORT_REQUIRE_ABC_PERIOD="1"
            REPORT_AUTO_COMPLETE_DATE="0"
            REPORT_AS_OF_DATE="$AS_OF_DATE"
            REPORT_REQUIRE_DATA_DATE="$REQUIRE_DATE"
            REPORT_REQUIRE_ADS_DATE="$REQUIRE_DATE"
            WB_DAILY_TARGET_DATE="$AS_OF_DATE"
          elif [ "$MODE" = "current_week" ]; then
            REPORT_CLOSED_WEEK_AS_PREVIOUS="0"
            REPORT_REQUIRE_ABC_PERIOD="0"
            REPORT_AUTO_COMPLETE_DATE="1"
            REPORT_AS_OF_DATE=""
            REPORT_REQUIRE_DATA_DATE=""
            REPORT_REQUIRE_ADS_DATE=""
            WB_DAILY_TARGET_DATE="$(TZ=Europe/Moscow date -d 'yesterday' +%F)"
          elif [ "$MODE" = "smoke" ]; then
            REPORT_CLOSED_WEEK_AS_PREVIOUS="0"
            REPORT_REQUIRE_ABC_PERIOD="0"
            REPORT_AUTO_COMPLETE_DATE="0"
            REPORT_AS_OF_DATE=""
            REPORT_REQUIRE_DATA_DATE=""
            REPORT_REQUIRE_ADS_DATE=""
            WB_DAILY_TARGET_DATE=""
            SEND_TELEGRAM="false"
          else
            echo "ERROR: unknown mode=$MODE"
            exit 1
          fi

          {
            echo "MODE=$MODE"
            echo "SEND_TELEGRAM=$SEND_TELEGRAM"
            echo "REPORT_CLOSED_WEEK_AS_PREVIOUS=$REPORT_CLOSED_WEEK_AS_PREVIOUS"
            echo "REPORT_REQUIRE_ABC_PERIOD=$REPORT_REQUIRE_ABC_PERIOD"
            echo "REPORT_AUTO_COMPLETE_DATE=$REPORT_AUTO_COMPLETE_DATE"
            echo "REPORT_AS_OF_DATE=$REPORT_AS_OF_DATE"
            echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
            echo "REPORT_REQUIRE_ADS_DATE=$REPORT_REQUIRE_ADS_DATE"
            echo "WB_DAILY_TARGET_DATE=$WB_DAILY_TARGET_DATE"
          } >> "$GITHUB_ENV"

          {
            echo "mode=$MODE"
            echo "send_telegram=$SEND_TELEGRAM"
          } >> "$GITHUB_OUTPUT"

          echo "MODE=$MODE"
          echo "SEND_TELEGRAM=$SEND_TELEGRAM"
          echo "REPORT_AS_OF_DATE=$REPORT_AS_OF_DATE"
          echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
          echo "REPORT_REQUIRE_ADS_DATE=$REPORT_REQUIRE_ADS_DATE"
          echo "REPORT_AUTO_COMPLETE_DATE=$REPORT_AUTO_COMPLETE_DATE"

      - name: Validate storage env
        if: steps.decide.outputs.mode != 'smoke'
        shell: bash
        run: |
          set -euo pipefail

          set -a
          source .env || true
          set +a

          test -n "${YC_ACCESS_KEY_ID:-}" || { echo "ERROR: YC_ACCESS_KEY_ID is missing. Add it to REPORT_ENV or GitHub Secrets"; exit 1; }
          test -n "${YC_SECRET_ACCESS_KEY:-}" || { echo "ERROR: YC_SECRET_ACCESS_KEY is missing. Add it to REPORT_ENV or GitHub Secrets"; exit 1; }
          test -n "${YC_BUCKET_NAME:-}" || { echo "ERROR: YC_BUCKET_NAME is missing. Add it to REPORT_ENV or GitHub Secrets"; exit 1; }

          echo "Storage env OK"
          echo "YC_BUCKET_NAME=$YC_BUCKET_NAME"
          echo "YC_ENDPOINT_URL=${YC_ENDPOINT_URL:-default}"

      - name: Validate Telegram env
        if: steps.decide.outputs.send_telegram == 'true'
        shell: bash
        run: |
          set -euo pipefail

          set -a
          source .env || true
          set +a

          # Fallback на старые временные имена, если вдруг они попали в окружение.
          export TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN:-${TELEGRAM_BOT_TOKEN_SECRET:-}}"
          export TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID:-${TELEGRAM_CHAT_ID_SECRET:-}}"
          export TELEGRAM_MESSAGE_THREAD_ID="${TELEGRAM_MESSAGE_THREAD_ID:-${TELEGRAM_MESSAGE_THREAD_ID_SECRET:-}}"

          test -n "${TELEGRAM_BOT_TOKEN:-}" || { echo "ERROR: TELEGRAM_BOT_TOKEN is missing. Add it to REPORT_ENV or GitHub Secrets"; exit 1; }
          test -n "${TELEGRAM_CHAT_ID:-}" || { echo "ERROR: TELEGRAM_CHAT_ID is missing. Add it to REPORT_ENV or GitHub Secrets"; exit 1; }

          {
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"
            echo "TELEGRAM_MESSAGE_THREAD_ID=${TELEGRAM_MESSAGE_THREAD_ID:-}"
          } >> "$GITHUB_ENV"

          echo "Telegram env OK"

      - name: Smoke test
        if: steps.decide.outputs.mode == 'smoke'
        shell: bash
        run: |
          set -euo pipefail
          python "$REPORT_SCRIPT" --root . --smoke-test

      - name: Preflight before full refresh
        if: steps.decide.outputs.mode == 'full_refresh'
        shell: bash
        run: |
          set -euo pipefail

          set -a
          source .env || true
          set +a

          echo "Preflight before long report run"
          echo "MODE=$MODE"
          echo "REPORT_AS_OF_DATE=${REPORT_AS_OF_DATE:-}"
          echo "REPORT_REQUIRE_DATA_DATE=${REPORT_REQUIRE_DATA_DATE:-}"
          echo "REPORT_REQUIRE_ADS_DATE=${REPORT_REQUIRE_ADS_DATE:-}"

          python "$REPORT_SCRIPT" --root . --store TOPFACE --preflight-date-check

      - name: Run full refresh report
        if: steps.decide.outputs.mode == 'full_refresh'
        shell: bash
        run: |
          set -euo pipefail

          set -a
          source .env || true
          set +a

          export TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN:-${TELEGRAM_BOT_TOKEN_SECRET:-}}"
          export TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID:-${TELEGRAM_CHAT_ID_SECRET:-}}"
          export TELEGRAM_MESSAGE_THREAD_ID="${TELEGRAM_MESSAGE_THREAD_ID:-${TELEGRAM_MESSAGE_THREAD_ID_SECRET:-}}"

          ARGS="--root . --full-refresh --store TOPFACE"

          if [ "$SEND_TELEGRAM" = "true" ]; then
            ARGS="$ARGS --send-telegram"
          fi

          python "$REPORT_SCRIPT" $ARGS

      - name: Run current week report
        if: steps.decide.outputs.mode == 'current_week'
        shell: bash
        run: |
          set -euo pipefail

          set -a
          source .env || true
          set +a

          export TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN:-${TELEGRAM_BOT_TOKEN_SECRET:-}}"
          export TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID:-${TELEGRAM_CHAT_ID_SECRET:-}}"
          export TELEGRAM_MESSAGE_THREAD_ID="${TELEGRAM_MESSAGE_THREAD_ID:-${TELEGRAM_MESSAGE_THREAD_ID_SECRET:-}}"

          ARGS="--root . --current-week-only --store TOPFACE"

          if [ "$SEND_TELEGRAM" = "true" ]; then
            ARGS="$ARGS --send-telegram"
          fi

          python "$REPORT_SCRIPT" $ARGS
