# VERSION: DAILY_REPORT_TOPFACE_WEEKLY_FULL_DAILY_LIGHT_20260602
name: Daily TOPFACE report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke / current_week / full_refresh. full_refresh = полный пересчёт закрытой недели; current_week = лёгкий дневной режим"
        required: true
        default: "current_week"
        type: choice
        options:
          - smoke
          - current_week
          - full_refresh
      send_telegram:
        description: "Send generated PDF to Telegram"
        required: true
        default: true
        type: boolean
      report_as_of_date:
        description: "YYYY-MM-DD. Только для ручного full_refresh; пусто = последнее полностью закрытое воскресенье"
        required: false
        default: ""
        type: string
      require_data_date:
        description: "YYYY-MM-DD. Только для ручного full_refresh; пусто = report_as_of_date"
        required: false
        default: ""
        type: string
  schedule:
    # Каждый день 13:50 МСК = 10:50 UTC.
    # Понедельник: full_refresh закрытой недели.
    # Остальные дни: current_week лёгкий режим, без полного пересчёта.
    - cron: "50 10 * * *"

permissions:
  contents: read

concurrency:
  group: wb-report-topface-daily
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      # В репозитории файл должен называться report_runner.py.
      # Уникальные имена в чате нужны только чтобы не путать скачанные версии.
      REPORT_SCRIPT: "report_runner.py"
      WB_MONTH_GP_PLAN: "1800000"

      TELEGRAM_BOT_TOKEN_SECRET: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_SECRET: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID_SECRET: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

      WB_MAX_SEARCH_QUERY_FILES: "4"
      WB_MAX_ENTRY_POINT_FILES: "4"
      WB_MAX_STOCK_FILES: "5"

      PDF_FAIL_ON_MISSING_DEMAND: "0"
      PDF_ALLOW_DEMAND_FALLBACK: "0"
      PDF_PRODUCT_DETAIL_MIN_GP_SHARE: "10"
      PDF_FORCE_DETAIL_PRODUCTS: "901,614,617,618,154,155,156,157,158"
      PDF_FORCE_EXCLUDE_PRODUCTS: "206,207,209,210,211"
      PDF_TRACE_SAMPLE_CATEGORY: "Кисти"
      PDF_TRACE_SAMPLE_PRODUCT: "901"
      PDF_TRACE_SAMPLE_ARTICLE: "901/2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install reportlab

      - name: Validate report script file
        shell: bash
        run: |
          set -euo pipefail
          test -f "$REPORT_SCRIPT" || { echo "ERROR: $REPORT_SCRIPT is missing in repository root"; exit 1; }
          echo "Using report script: $REPORT_SCRIPT"
          head -5 "$REPORT_SCRIPT"
          grep -q "# VERSION: ORDERS_ONLY_AND_TG_FIX25_WEEKLY_FULL_DAILY_LIGHT_20260602" "$REPORT_SCRIPT" || { echo "ERROR: wrong report script version. Expected ORDERS_ONLY_AND_TG_FIX25_WEEKLY_FULL_DAILY_LIGHT_20260602"; exit 1; }
          if grep -nE "^(umask|set -euo pipefail|name: TOPFACE|on:)" "$REPORT_SCRIPT"; then
            echo "ERROR: workflow/shell text was pasted into the Python report script"
            exit 1
          fi
          python -m py_compile "$REPORT_SCRIPT"
          echo "Compile OK"

      - name: Decide mode
        id: mode
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_SEND_TELEGRAM: ${{ github.event.inputs.send_telegram }}
          INPUT_AS_OF_DATE: ${{ github.event.inputs.report_as_of_date }}
          INPUT_REQUIRE_DATA_DATE: ${{ github.event.inputs.require_data_date }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${INPUT_MODE:-current_week}"
            SEND_TELEGRAM="${INPUT_SEND_TELEGRAM:-true}"
          else
            # GitHub cron в UTC; определяем день недели по Москве.
            # 1 = понедельник.
            MSK_DOW="$(python -c 'from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo("Europe/Moscow")).isoweekday())')"
            if [ "$MSK_DOW" = "1" ]; then
              MODE="full_refresh"
            else
              MODE="current_week"
            fi
            SEND_TELEGRAM="true"
          fi

          if [ "$MODE" = "full_refresh" ]; then
            if [ -n "${INPUT_AS_OF_DATE:-}" ]; then
              REPORT_AS_OF_DATE="$INPUT_AS_OF_DATE"
            else
              REPORT_AS_OF_DATE="$(python -c 'from datetime import datetime, timedelta; from zoneinfo import ZoneInfo; today = datetime.now(ZoneInfo("Europe/Moscow")).date(); print((today - timedelta(days=today.weekday() + 1)).isoformat())')"
            fi
            if [ -n "${INPUT_REQUIRE_DATA_DATE:-}" ]; then
              REPORT_REQUIRE_DATA_DATE="$INPUT_REQUIRE_DATA_DATE"
            else
              REPORT_REQUIRE_DATA_DATE="$REPORT_AS_OF_DATE"
            fi
            REPORT_REQUIRE_ADS_DATE="$REPORT_REQUIRE_DATA_DATE"
            REPORT_CLOSED_WEEK_AS_PREVIOUS="1"
            REPORT_REQUIRE_ABC_PERIOD="1"
            REPORT_AUTO_COMPLETE_DATE="0"
            WB_DAILY_TARGET_DATE="$REPORT_AS_OF_DATE"
          elif [ "$MODE" = "current_week" ]; then
            # Лёгкий режим: не требуем вчерашний день жёстко.
            # report_runner.py сам выберет последнюю дату, где одновременно есть orders/funnel/search + ads.
            REPORT_AS_OF_DATE=""
            REPORT_REQUIRE_DATA_DATE=""
            REPORT_REQUIRE_ADS_DATE=""
            REPORT_CLOSED_WEEK_AS_PREVIOUS="0"
            REPORT_REQUIRE_ABC_PERIOD="0"
            REPORT_AUTO_COMPLETE_DATE="1"
            WB_DAILY_TARGET_DATE="$(TZ=Europe/Moscow date -d 'yesterday' +%F)"
          elif [ "$MODE" = "smoke" ]; then
            REPORT_AS_OF_DATE=""
            REPORT_REQUIRE_DATA_DATE=""
            REPORT_REQUIRE_ADS_DATE=""
            REPORT_CLOSED_WEEK_AS_PREVIOUS="0"
            REPORT_REQUIRE_ABC_PERIOD="0"
            REPORT_AUTO_COMPLETE_DATE="0"
            WB_DAILY_TARGET_DATE=""
          else
            echo "ERROR: unknown MODE=$MODE"
            exit 1
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "send_telegram=$SEND_TELEGRAM" >> "$GITHUB_OUTPUT"
          {
            echo "REPORT_AS_OF_DATE=$REPORT_AS_OF_DATE"
            echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
            echo "REPORT_REQUIRE_ADS_DATE=$REPORT_REQUIRE_ADS_DATE"
            echo "REPORT_CLOSED_WEEK_AS_PREVIOUS=$REPORT_CLOSED_WEEK_AS_PREVIOUS"
            echo "REPORT_REQUIRE_ABC_PERIOD=$REPORT_REQUIRE_ABC_PERIOD"
            echo "REPORT_AUTO_COMPLETE_DATE=$REPORT_AUTO_COMPLETE_DATE"
            echo "WB_DAILY_TARGET_DATE=$WB_DAILY_TARGET_DATE"
          } >> "$GITHUB_ENV"
          echo "Selected mode: $MODE"
          echo "Send Telegram: $SEND_TELEGRAM"
          echo "REPORT_AS_OF_DATE=$REPORT_AS_OF_DATE"
          echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
          echo "REPORT_REQUIRE_ADS_DATE=$REPORT_REQUIRE_ADS_DATE"
          echo "REPORT_AUTO_COMPLETE_DATE=$REPORT_AUTO_COMPLETE_DATE"
          echo "WB_DAILY_TARGET_DATE=$WB_DAILY_TARGET_DATE"

      - name: Run smoke test
        if: steps.mode.outputs.mode == 'smoke'
        shell: bash
        run: python "$REPORT_SCRIPT" --root . --smoke-test

      - name: Load REPORT_ENV
        if: steps.mode.outputs.mode != 'smoke'
        shell: bash
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
        run: |
          set -euo pipefail
          test -n "${REPORT_ENV:-}" || { echo "ERROR: secret REPORT_ENV is empty or missing"; exit 1; }
          umask 077
          printf '%s\n' "$REPORT_ENV" > .env
          set -a
          source ./.env
          set +a
          test -n "${YC_ACCESS_KEY_ID:-}" || { echo "ERROR: YC_ACCESS_KEY_ID is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_SECRET_ACCESS_KEY:-}" || { echo "ERROR: YC_SECRET_ACCESS_KEY is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_BUCKET_NAME:-}" || { echo "ERROR: YC_BUCKET_NAME is missing in REPORT_ENV"; exit 1; }

      - name: Preflight real data date check for weekly full refresh
        if: steps.mode.outputs.mode == 'full_refresh'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          echo "Preflight before long full refresh"
          echo "MODE=${{ steps.mode.outputs.mode }}"
          echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
          echo "REPORT_REQUIRE_ADS_DATE=$REPORT_REQUIRE_ADS_DATE"
          python "$REPORT_SCRIPT" --root . --preflight-date-check

      - name: Prepare and validate Telegram settings
        if: ${{ steps.mode.outputs.mode != 'smoke' && steps.mode.outputs.send_telegram == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          clean_token() {
            local v="${1:-}"
            v="${v//$'\r'/}"
            v="${v//$'\n'/}"
            v="${v//[[:space:]]/}"
            printf '%s' "$v"
          }

          set -a
          source ./.env
          set +a

          TOKEN="$(clean_token "${TELEGRAM_BOT_TOKEN_SECRET:-}")"
          CHAT_ID="$(clean_token "${TELEGRAM_CHAT_ID_SECRET:-}")"
          THREAD_ID="$(clean_token "${TELEGRAM_MESSAGE_THREAD_ID_SECRET:-}")"

          if [ -z "$TOKEN" ]; then TOKEN="$(clean_token "${TELEGRAM_BOT_TOKEN:-}")"; fi
          if [ -z "$CHAT_ID" ]; then CHAT_ID="$(clean_token "${TELEGRAM_CHAT_ID:-}")"; fi
          if [ -z "$THREAD_ID" ]; then THREAD_ID="$(clean_token "${TELEGRAM_MESSAGE_THREAD_ID:-}")"; fi

          test -n "$TOKEN" || { echo "ERROR: TELEGRAM_BOT_TOKEN is empty"; exit 1; }
          test -n "$CHAT_ID" || { echo "ERROR: TELEGRAM_CHAT_ID is empty"; exit 1; }

          {
            echo "TELEGRAM_BOT_TOKEN=$TOKEN"
            echo "TELEGRAM_CHAT_ID=$CHAT_ID"
            if [ -n "$THREAD_ID" ]; then echo "TELEGRAM_MESSAGE_THREAD_ID=$THREAD_ID"; fi
          } >> "$GITHUB_ENV"

          echo "Telegram settings OK"

      - name: Run report
        if: steps.mode.outputs.mode != 'smoke'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          TG_FLAG=""
          if [ "${{ steps.mode.outputs.send_telegram }}" = "true" ]; then TG_FLAG="--send-telegram"; fi

          if [ "${{ steps.mode.outputs.mode }}" = "full_refresh" ]; then
            python "$REPORT_SCRIPT" --root . --full-refresh $TG_FLAG
          else
            python "$REPORT_SCRIPT" --root . --current-week-only $TG_FLAG
          fi
