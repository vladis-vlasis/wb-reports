# VERSION: DAILY_REPORT_TOPFACE_ORDERS_ONLY_TG_FIX5_DATA_FIX_20260528
name: Daily TOPFACE report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke / current_week / full_refresh"
        required: true
        default: "current_week"
        type: choice
        options:
          - smoke
          - current_week
          - full_refresh
      send_telegram:
        description: "Send generated PDF to Telegram"
        required: true
        default: true
        type: boolean
  schedule:
    # Tue-Sun 12:00 MSK = 09:00 UTC: current-week update.
    - cron: "0 9 * * 2-6"
    - cron: "0 9 * * 0"
    # Monday 18:00 MSK = 15:00 UTC: full refresh after weekly data is available.
    - cron: "0 15 * * 1"

permissions:
  contents: read

concurrency:
  group: wb-report-topface-daily
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      REPORT_SCRIPT: "report_runner.py"

      # Repository secrets. These have priority over values inside REPORT_ENV.
      TELEGRAM_BOT_TOKEN_SECRET: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID_SECRET: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_MESSAGE_THREAD_ID_SECRET: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}

      WB_MAX_SEARCH_QUERY_FILES: "4"
      WB_MAX_ENTRY_POINT_FILES: "4"
      WB_MAX_STOCK_FILES: "5"

      PDF_FAIL_ON_MISSING_DEMAND: "0"
      PDF_ALLOW_DEMAND_FALLBACK: "0"
      PDF_PRODUCT_DETAIL_MIN_GP_SHARE: "10"
      PDF_FORCE_DETAIL_PRODUCTS: "901,614,617,618,154,155,156,157,158"
      PDF_FORCE_EXCLUDE_PRODUCTS: "206,207,209,210,211"
      PDF_TRACE_SAMPLE_CATEGORY: "Кисти"
      PDF_TRACE_SAMPLE_PRODUCT: "901"
      PDF_TRACE_SAMPLE_ARTICLE: "901/2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install reportlab

      - name: Validate report script file
        shell: bash
        run: |
          set -euo pipefail
          test -f "$REPORT_SCRIPT" || { echo "ERROR: $REPORT_SCRIPT is missing in repository root"; exit 1; }
          echo "Using report script: $REPORT_SCRIPT"
          head -5 "$REPORT_SCRIPT"
          grep -q "# VERSION: ORDERS_ONLY_AND_TG_FIX4_PRICEWITHDISC_20260528" "$REPORT_SCRIPT" || { echo "ERROR: wrong report script version. Expected ORDERS_ONLY_AND_TG_FIX4_PRICEWITHDISC_20260528"; exit 1; }
          if grep -nE "^(umask|set -euo pipefail|name: TOPFACE|on:)" "$REPORT_SCRIPT"; then
            echo "ERROR: workflow/shell text was pasted into the Python report script"
            exit 1
          fi
          python -m py_compile "$REPORT_SCRIPT"
          echo "Compile OK"

      - name: Decide mode
        id: mode
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_SEND_TELEGRAM: ${{ github.event.inputs.send_telegram }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${INPUT_MODE:-current_week}"
            SEND_TELEGRAM="${INPUT_SEND_TELEGRAM:-true}"
          elif [ "${{ github.event.schedule }}" = "0 15 * * 1" ]; then
            MODE="full_refresh"
            SEND_TELEGRAM="true"
          else
            MODE="current_week"
            SEND_TELEGRAM="true"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "send_telegram=$SEND_TELEGRAM" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"
          echo "Send Telegram: $SEND_TELEGRAM"

      - name: Run smoke test
        if: steps.mode.outputs.mode == 'smoke'
        shell: bash
        run: python "$REPORT_SCRIPT" --root . --smoke-test

      - name: Load REPORT_ENV
        if: steps.mode.outputs.mode != 'smoke'
        shell: bash
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
        run: |
          set -euo pipefail
          test -n "${REPORT_ENV:-}" || { echo "ERROR: secret REPORT_ENV is empty or missing"; exit 1; }
          umask 077
          printf '%s\n' "$REPORT_ENV" > .env
          set -a
          source ./.env
          set +a
          test -n "${YC_ACCESS_KEY_ID:-}" || { echo "ERROR: YC_ACCESS_KEY_ID is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_SECRET_ACCESS_KEY:-}" || { echo "ERROR: YC_SECRET_ACCESS_KEY is missing in REPORT_ENV"; exit 1; }
          test -n "${YC_BUCKET_NAME:-}" || { echo "ERROR: YC_BUCKET_NAME is missing in REPORT_ENV"; exit 1; }

      - name: Prepare and validate Telegram settings
        if: ${{ steps.mode.outputs.mode != 'smoke' && steps.mode.outputs.send_telegram == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          clean_token() {
            local raw="$1"
            raw="$(printf '%s' "$raw" | tr -d '\r\n\t ')"
            raw="${raw%\"}"; raw="${raw#\"}"
            raw="${raw%\'}"; raw="${raw#\'}"
            if [[ "$raw" == TELEGRAM_BOT_TOKEN=* ]]; then raw="${raw#TELEGRAM_BOT_TOKEN=}"; fi
            if [[ "$raw" == telegram_bot_token=* ]]; then raw="${raw#telegram_bot_token=}"; fi
            if [[ "$raw" =~ ^https?://api\.telegram\.org/bot([^/]+) ]]; then raw="${BASH_REMATCH[1]}"; fi
            raw="${raw%%/getUpdates*}"
            raw="${raw%%/sendDocument*}"
            if [[ "$raw" == bot* ]]; then raw="${raw#bot}"; fi
            printf '%s' "$raw"
          }

          clean_chat() {
            local raw="$1"
            raw="$(printf '%s' "$raw" | tr -d '\r\n\t ')"
            raw="${raw%\"}"; raw="${raw#\"}"
            raw="${raw%\'}"; raw="${raw#\'}"
            if [[ "$raw" == TELEGRAM_CHAT_ID=* ]]; then raw="${raw#TELEGRAM_CHAT_ID=}"; fi
            if [[ "$raw" == telegram_chat_id=* ]]; then raw="${raw#telegram_chat_id=}"; fi
            printf '%s' "$raw"
          }

          SECRET_TG_TOKEN="${TELEGRAM_BOT_TOKEN_SECRET:-}"
          SECRET_TG_CHAT="${TELEGRAM_CHAT_ID_SECRET:-}"
          SECRET_TG_THREAD="${TELEGRAM_MESSAGE_THREAD_ID_SECRET:-}"

          ENV_TG_TOKEN=""
          ENV_TG_CHAT=""
          ENV_TG_THREAD=""
          if [ -f ./.env ]; then
            set -a
            source ./.env
            set +a
            ENV_TG_TOKEN="${TELEGRAM_BOT_TOKEN:-}"
            ENV_TG_CHAT="${TELEGRAM_CHAT_ID:-}"
            ENV_TG_THREAD="${TELEGRAM_MESSAGE_THREAD_ID:-}"
          fi

          TG_TOKEN="$SECRET_TG_TOKEN"
          TG_CHAT="$SECRET_TG_CHAT"
          TG_THREAD="$SECRET_TG_THREAD"
          if [ -z "$TG_TOKEN" ]; then TG_TOKEN="$ENV_TG_TOKEN"; fi
          if [ -z "$TG_CHAT" ]; then TG_CHAT="$ENV_TG_CHAT"; fi
          if [ -z "$TG_THREAD" ]; then TG_THREAD="$ENV_TG_THREAD"; fi

          TG_TOKEN="$(clean_token "$TG_TOKEN")"
          TG_CHAT="$(clean_chat "$TG_CHAT")"
          TG_THREAD="$(clean_chat "$TG_THREAD")"

          test -n "$TG_TOKEN" || { echo "ERROR: TELEGRAM_BOT_TOKEN is missing"; exit 1; }
          test -n "$TG_CHAT" || { echo "ERROR: TELEGRAM_CHAT_ID is missing"; exit 1; }
          if ! [[ "$TG_TOKEN" =~ ^[0-9]+:[A-Za-z0-9_-]{30,}$ ]]; then
            echo "ERROR: TELEGRAM_BOT_TOKEN has invalid format after cleanup. Secret value must be only the token like 123456789:AA..."
            exit 1
          fi
          if ! [[ "$TG_CHAT" =~ ^-?[0-9]+$ ]]; then
            echo "ERROR: TELEGRAM_CHAT_ID has invalid format. For your group it must be -1003664843585"
            exit 1
          fi

          export TG_TOKEN TG_CHAT TG_THREAD
          python - <<'PY_WRITE_TG'
          import os, pathlib, shlex
          p = pathlib.Path('.telegram.env')
          with p.open('w', encoding='utf-8') as f:
              print('TELEGRAM_BOT_TOKEN=' + shlex.quote(os.environ['TG_TOKEN']), file=f)
              print('TELEGRAM_CHAT_ID=' + shlex.quote(os.environ['TG_CHAT']), file=f)
              print('TELEGRAM_MESSAGE_THREAD_ID=' + shlex.quote(os.environ.get('TG_THREAD', '')), file=f)
          p.chmod(0o600)
          PY_WRITE_TG

          echo "Telegram token prefix: ${TG_TOKEN:0:6}***"
          echo "Telegram chat id: $TG_CHAT"
          if [ -n "$TG_THREAD" ]; then echo "Telegram thread id: $TG_THREAD"; fi

          HTTP_CODE="$(curl -sS -w '%{http_code}' -o telegram_getme_response.json "https://api.telegram.org/bot${TG_TOKEN}/getMe" || true)"
          cat telegram_getme_response.json || true
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Telegram getMe returned HTTP $HTTP_CODE. Check TELEGRAM_BOT_TOKEN."
            exit 1
          fi
          python - <<'PY_CHECK_TG'
          import json, pathlib, sys
          data = json.loads(pathlib.Path('telegram_getme_response.json').read_text(encoding='utf-8'))
          if not data.get('ok'):
              print('ERROR: Telegram getMe ok=false:', data)
              sys.exit(1)
          print('Telegram bot validated:', data.get('result', {}).get('username', 'unknown'))
          PY_CHECK_TG

          HTTP_CODE="$(curl -sS -G -w '%{http_code}' -o telegram_getchat_response.json "https://api.telegram.org/bot${TG_TOKEN}/getChat" --data-urlencode "chat_id=${TG_CHAT}" || true)"
          cat telegram_getchat_response.json || true
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Telegram getChat returned HTTP $HTTP_CODE. Check TELEGRAM_CHAT_ID and make sure the bot is added to the group."
            exit 1
          fi
          python - <<'PY_CHECK_CHAT'
          import json, pathlib, sys
          data = json.loads(pathlib.Path('telegram_getchat_response.json').read_text(encoding='utf-8'))
          if not data.get('ok'):
              print('ERROR: Telegram getChat ok=false:', data)
              sys.exit(1)
          chat = data.get('result', {})
          print('Telegram chat validated:', chat.get('title') or chat.get('username') or chat.get('id'))
          PY_CHECK_CHAT

      - name: Run current week update
        if: steps.mode.outputs.mode == 'current_week'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          python "$REPORT_SCRIPT" --root . --current-week-only

      - name: Run full refresh
        if: steps.mode.outputs.mode == 'full_refresh'
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source ./.env
          set +a
          python "$REPORT_SCRIPT" --root . --full-refresh

      - name: Send PDF to Telegram
        if: ${{ steps.mode.outputs.mode != 'smoke' && steps.mode.outputs.send_telegram == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          test -f .telegram.env || { echo "ERROR: .telegram.env not found. Telegram validation step did not run."; exit 1; }
          set -a
          source ./.telegram.env
          set +a

          REPORT_DIR="Отчёты/Объединенный отчет/TOPFACE"
          export REPORT_DIR
          PDF_FILE="$(python - <<'PY_FIND_PDF'
          import os
          from pathlib import Path
          report_dir = Path(os.environ['REPORT_DIR'])
          files = sorted(report_dir.glob('Отчет по продажам Влад *.pdf'), key=lambda p: p.stat().st_mtime, reverse=True)
          if not files:
              files = sorted(report_dir.glob('*.pdf'), key=lambda p: p.stat().st_mtime, reverse=True)
          print(files[0] if files else '')
          PY_FIND_PDF
          )"
          test -n "$PDF_FILE" || { echo "ERROR: PDF file not found in $REPORT_DIR"; exit 1; }
          test -s "$PDF_FILE" || { echo "ERROR: PDF file is empty: $PDF_FILE"; exit 1; }

          CAPTION="$(basename "$PDF_FILE" .pdf)"
          echo "Telegram: sending file: $PDF_FILE"
          CURL_ARGS=(
            -sS
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
            -F "chat_id=${TELEGRAM_CHAT_ID}"
            -F "caption=${CAPTION}"
            -F "document=@${PDF_FILE}"
          )
          if [ -n "${TELEGRAM_MESSAGE_THREAD_ID:-}" ]; then
            CURL_ARGS+=(-F "message_thread_id=${TELEGRAM_MESSAGE_THREAD_ID}")
          fi
          HTTP_CODE="$(curl "${CURL_ARGS[@]}" -w '%{http_code}' -o telegram_send_response.json || true)"
          cat telegram_send_response.json || true
          echo
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Telegram sendDocument returned HTTP $HTTP_CODE"
            echo "If HTTP is 400, check TELEGRAM_CHAT_ID / TELEGRAM_MESSAGE_THREAD_ID and make sure the bot has access to the chat/topic."
            echo "If HTTP is 404, check TELEGRAM_BOT_TOKEN."
            exit 1
          fi
          python - <<'PY_SEND_TG'
          import json, pathlib, sys
          data = json.loads(pathlib.Path('telegram_send_response.json').read_text(encoding='utf-8'))
          if not data.get('ok'):
              print('ERROR: Telegram sendDocument ok=false:', data)
              sys.exit(1)
          print('Telegram: sent successfully')
          PY_SEND_TG

      - name: Show generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "Отчёты" -maxdepth 5 -type f -print 2>/dev/null || true

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-report-output-fix4-20260528
          path: |
            Отчёты/**/*.xlsx
            Отчёты/**/*.pdf
            Отчёты/**/*.json
            Отчёты/**/*.txt
          if-no-files-found: warn
          retention-days: 30
