name: TOPFACE daily report

on:
  schedule:
    # Понедельник 13:50 МСК / 10:50 UTC: полный пересчет закрытой недели.
    - cron: "50 10 * * 1"
    # Вторник-суббота 13:50 МСК / 10:50 UTC: быстрый текущий блок.
    - cron: "50 10 * * 2-6"
    # Воскресенье 13:50 МСК / 10:50 UTC: быстрый текущий блок.
    - cron: "50 10 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим отчета"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - full_refresh
          - current_week
          - pdf_only
          - smoke_test
      send_telegram:
        description: "Отправить PDF в Telegram"
        required: false
        default: true
        type: boolean
      report_as_of_date:
        description: "Принудительная дата отчета YYYY-MM-DD. Пусто = авто"
        required: false
        default: ""
      require_data_date:
        description: "Дата, которая обязана быть в данных YYYY-MM-DD. Пусто = как report_as_of_date/авто"
        required: false
        default: ""
      require_abc_period:
        description: "Требовать точный ABC за закрытую неделю"
        required: false
        default: false
        type: boolean

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      REPORT_ENV: ${{ secrets.REPORT_ENV }}
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ENDPOINT_URL: ${{ secrets.YC_ENDPOINT_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      AWS_DEFAULT_REGION: ru-central1
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pandas numpy openpyxl boto3 requests reportlab

      - name: Load REPORT_ENV fallback
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          raw = os.environ.get("REPORT_ENV", "") or ""
          if not raw.strip():
              print("REPORT_ENV is empty; using direct GitHub secrets only")
              raise SystemExit(0)

          normalized = raw.replace("\r\n", "\n").replace("\r", "\n")
          if "\n" not in normalized and "\\n" in normalized:
              normalized = normalized.replace("\\n", "\n")

          out = Path(os.environ["GITHUB_ENV"])
          loaded = []
          with out.open("a", encoding="utf-8") as fh:
              for line in normalized.splitlines():
                  line = line.strip()
                  if not line or line.startswith("#"):
                      continue
                  if line.startswith("export "):
                      line = line[len("export "):].strip()
                  if "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  key = key.strip().lstrip("\ufeff")
                  value = value.strip().strip('"').strip("'")
                  if not key:
                      continue
                  if (os.environ.get(key) or "").strip():
                      continue
                  fh.write(f"{key}={value}\n")
                  loaded.append(key)
          print("REPORT_ENV loaded keys:", loaded)
          PY

      - name: Decide report mode and dates
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            SEND_TELEGRAM="true"
            if [ "${{ github.event.schedule }}" = "50 10 * * 1" ]; then
              MODE="full_refresh"
            else
              MODE="current_week"
            fi
          else
            MODE="${{ github.event.inputs.mode || 'auto' }}"
            SEND_TELEGRAM="${{ github.event.inputs.send_telegram || 'true' }}"
            if [ "$MODE" = "auto" ]; then
              # Ручной auto повторяет календарную логику schedule.
              DOW="$(TZ=Europe/Moscow date +%u)"
              if [ "$DOW" = "1" ]; then
                MODE="full_refresh"
              else
                MODE="current_week"
              fi
            fi
          fi

          INPUT_AS_OF="${{ github.event.inputs.report_as_of_date || '' }}"
          INPUT_REQUIRE="${{ github.event.inputs.require_data_date || '' }}"
          INPUT_REQUIRE_ABC="${{ github.event.inputs.require_abc_period || 'false' }}"

          if [ -n "$INPUT_AS_OF" ]; then
            REPORT_AS_OF_DATE="$INPUT_AS_OF"
          elif [ "$MODE" = "full_refresh" ]; then
            REPORT_AS_OF_DATE="$(TZ=Europe/Moscow date -d 'last sunday' +%F)"
          else
            REPORT_AS_OF_DATE="$(TZ=Europe/Moscow date -d 'yesterday' +%F)"
          fi

          if [ -n "$INPUT_REQUIRE" ]; then
            REPORT_REQUIRE_DATA_DATE="$INPUT_REQUIRE"
          else
            REPORT_REQUIRE_DATA_DATE="$REPORT_AS_OF_DATE"
          fi

          if [ "$MODE" = "full_refresh" ]; then
            REPORT_CLOSED_WEEK_AS_PREVIOUS="1"
            REPORT_REQUIRE_ABC_PERIOD="1"
          else
            REPORT_CLOSED_WEEK_AS_PREVIOUS="0"
            REPORT_REQUIRE_ABC_PERIOD="0"
          fi

          if [ "$INPUT_REQUIRE_ABC" = "true" ]; then
            REPORT_REQUIRE_ABC_PERIOD="1"
          fi

          {
            echo "MODE=$MODE"
            echo "SEND_TELEGRAM=$SEND_TELEGRAM"
            echo "REPORT_AS_OF_DATE=$REPORT_AS_OF_DATE"
            echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
            echo "REPORT_CLOSED_WEEK_AS_PREVIOUS=$REPORT_CLOSED_WEEK_AS_PREVIOUS"
            echo "REPORT_REQUIRE_ABC_PERIOD=$REPORT_REQUIRE_ABC_PERIOD"
          } >> "$GITHUB_ENV"

          echo "MODE=$MODE"
          echo "SEND_TELEGRAM=$SEND_TELEGRAM"
          echo "REPORT_AS_OF_DATE=$REPORT_AS_OF_DATE"
          echo "REPORT_REQUIRE_DATA_DATE=$REPORT_REQUIRE_DATA_DATE"
          echo "REPORT_CLOSED_WEEK_AS_PREVIOUS=$REPORT_CLOSED_WEEK_AS_PREVIOUS"
          echo "REPORT_REQUIRE_ABC_PERIOD=$REPORT_REQUIRE_ABC_PERIOD"

      - name: Run report
        shell: bash
        run: |
          set -euo pipefail

          TG_FLAG=""
          if [ "${SEND_TELEGRAM}" = "true" ]; then
            TG_FLAG="--send-telegram"
          fi

          if [ "$MODE" = "smoke_test" ]; then
            python report_runner.py --root . --smoke-test
          elif [ "$MODE" = "full_refresh" ]; then
            python report_runner.py --root . --full-refresh $TG_FLAG
          elif [ "$MODE" = "current_week" ]; then
            python report_runner.py --root . --current-week-only $TG_FLAG
          elif [ "$MODE" = "pdf_only" ]; then
            python report_runner.py --root . --pdf-only $TG_FLAG
          else
            echo "Unknown MODE=$MODE"
            exit 1
          fi
