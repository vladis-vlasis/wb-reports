name: Daily TOPFACE sales report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим запуска"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - current_week
          - full_refresh
          - smoke
      send_telegram:
        description: "Отправлять в Telegram"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  schedule:
    - cron: "50 10 * * *"   # 13:50 МСК каждый день

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      REPORT_SCRIPT: report_runner.py
      EXPECTED_VERSION: ORDERS_ONLY_TG_FIX26_ABC_DEDUPE_GP_MONTH_AVG_ADS_20260602

      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ENDPOINT_URL: ${{ secrets.YC_ENDPOINT_URL }}

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      WB_STORE: TOPFACE
      REPORT_STORE: TOPFACE
      REPORT_CLOSED_WEEK_AS_PREVIOUS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pandas openpyxl xlsxwriter boto3 requests matplotlib reportlab pillow python-dateutil

      - name: Check report script version
        run: |
          set -euo pipefail

          echo "Using report script: ${REPORT_SCRIPT}"
          head -n 8 "${REPORT_SCRIPT}"

          if ! grep -q "${EXPECTED_VERSION}" "${REPORT_SCRIPT}"; then
            echo "ERROR: wrong report script version. Expected ${EXPECTED_VERSION}"
            exit 1
          fi

      - name: Resolve run mode
        run: |
          set -euo pipefail

          echo "GitHub event: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "schedule" ]; then
            DOW="$(TZ=Europe/Moscow date +%u)"

            if [ "$DOW" = "1" ]; then
              MODE="full_refresh"
            else
              MODE="current_week"
            fi

            SEND_TELEGRAM="true"
          else
            MODE="${{ github.event.inputs.mode }}"
            SEND_TELEGRAM="${{ github.event.inputs.send_telegram }}"

            if [ "$MODE" = "auto" ]; then
              DOW="$(TZ=Europe/Moscow date +%u)"

              if [ "$DOW" = "1" ]; then
                MODE="full_refresh"
              else
                MODE="current_week"
              fi
            fi
          fi

          echo "MODE=$MODE" >> "$GITHUB_ENV"
          echo "SEND_TELEGRAM=$SEND_TELEGRAM" >> "$GITHUB_ENV"

          echo "Resolved MODE=$MODE"
          echo "Resolved SEND_TELEGRAM=$SEND_TELEGRAM"

      - name: Resolve closed week dates for full_refresh
        if: env.MODE == 'full_refresh'
        run: |
          set -euo pipefail

          DOW="$(TZ=Europe/Moscow date +%u)"

          # Последняя полностью закрытая неделя заканчивается прошлым воскресеньем.
          # Пн: -1 день, Вт: -2 дня, ..., Вс: -7 дней.
          LAST_SUNDAY="$(TZ=Europe/Moscow date -d "$DOW days ago" +%F)"

          echo "REPORT_AS_OF_DATE=$LAST_SUNDAY" >> "$GITHUB_ENV"
          echo "REPORT_REQUIRE_DATA_DATE=$LAST_SUNDAY" >> "$GITHUB_ENV"
          echo "REPORT_REQUIRE_ADS_DATE=$LAST_SUNDAY" >> "$GITHUB_ENV"
          echo "REPORT_CLOSED_WEEK_AS_PREVIOUS=1" >> "$GITHUB_ENV"

          echo "Full refresh closed week as_of=$LAST_SUNDAY"

      - name: Smoke test
        if: env.MODE == 'smoke'
        run: |
          set -euo pipefail
          python "${REPORT_SCRIPT}" --root . --smoke-test

      - name: Preflight before full refresh
        if: env.MODE == 'full_refresh'
        run: |
          set -euo pipefail

          echo "Preflight before long report run"
          echo "MODE=$MODE"
          echo "REPORT_AS_OF_DATE=${REPORT_AS_OF_DATE:-}"
          echo "REPORT_REQUIRE_DATA_DATE=${REPORT_REQUIRE_DATA_DATE:-}"
          echo "REPORT_REQUIRE_ADS_DATE=${REPORT_REQUIRE_ADS_DATE:-}"

          python "${REPORT_SCRIPT}" --root . --preflight-date-check

      - name: Run full refresh report
        if: env.MODE == 'full_refresh'
        run: |
          set -euo pipefail

          ARGS="--root . --full-refresh --store TOPFACE"

          if [ "${SEND_TELEGRAM}" = "true" ]; then
            ARGS="$ARGS --send-telegram"
          fi

          python "${REPORT_SCRIPT}" $ARGS

      - name: Run current week report
        if: env.MODE == 'current_week'
        run: |
          set -euo pipefail

          ARGS="--root . --current-week --store TOPFACE"

          if [ "${SEND_TELEGRAM}" = "true" ]; then
            ARGS="$ARGS --send-telegram"
          fi

          python "${REPORT_SCRIPT}" $ARGS
