name: Расчет юнит-экономики

on:
  workflow_dispatch:
  schedule:
    # 12:00 МСК = 09:00 UTC
    - cron: "0 9 * * *"

jobs:
  run:
    name: Запустить расчет юнит-экономики
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Загрузить переменные из REPORT_ENV и отдельные secrets
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
        run: |
          if [ -z "$REPORT_ENV" ]; then
            echo "::error::Не задан secret REPORT_ENV"
            exit 1
          fi

          # Все строки вида NAME=value из REPORT_ENV добавляем в окружение job
          printf '%s\n' "$REPORT_ENV" >> "$GITHUB_ENV"

          # WB-ключ у тебя заведён отдельным secret, поэтому добавляем его отдельно
          if [ -n "$WB_PROMO_KEY_TOPFACE" ]; then
            echo "WB_PROMO_KEY_TOPFACE=$WB_PROMO_KEY_TOPFACE" >> "$GITHUB_ENV"
          fi

      - name: Запустить расчет юнит-экономики
        run: |
          python raschet_unit_ekonomiki.py
