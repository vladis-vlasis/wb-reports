# VERSION: v17_REDUNDANT_SCHEDULE_1007_1017_MSK_20260611
# В GitHub заменить содержимое файла:
# .github/workflows/02_raschet_unit_ekonomiki.yml
#
# Важно:
# - REPORT_ENV оставлен как в рабочей схеме.
# - Секреты Торгстата здесь не используются.
# - Скрипт запускается через WB_STORE.
# - По расписанию считает оба магазина: TOPFACE и MISSTAIS.

name: Расчет юнит-экономики

on:
  workflow_dispatch:
    inputs:
      store:
        description: "Какой магазин считать"
        required: true
        default: "ALL"
        type: choice
        options:
          - ALL
          - TOPFACE
          - MISSTAIS
  schedule:
    # Каждый день с резервом: 10:07 и 10:17 МСК = 07:07 и 07:17 UTC.
    # Не ставим ровно на начало часа, потому что GitHub schedule может быть задержан или отброшен при высокой нагрузке.
    - cron: "7 7 * * *"
    - cron: "17 7 * * *"

concurrency:
  group: unit-economics-${{ github.ref }}
  cancel-in-progress: false

jobs:
  raschet-ekonomiki:
    name: Обновить Экономика.xlsx
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Скачать код из репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Загрузить переменные из REPORT_ENV
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "YML_VERSION=v17_REDUNDANT_SCHEDULE_1007_1017_MSK_20260611"

          if [ -z "$REPORT_ENV" ]; then
            echo "::error::Не задан secret REPORT_ENV"
            exit 1
          fi

          printf '%s\n' "$REPORT_ENV" | sed 's/\r$//' >> "$GITHUB_ENV"

          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> "$GITHUB_ENV"
          fi

          if [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> "$GITHUB_ENV"
          fi

      - name: Проверить переменные Yandex Cloud
        run: |
          missing=0

          for var in YC_ACCESS_KEY_ID YC_SECRET_ACCESS_KEY YC_BUCKET_NAME; do
            if [ -z "${!var}" ]; then
              echo "::error::После загрузки REPORT_ENV не найдена переменная $var"
              missing=1
            else
              echo "$var найден"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Запустить расчет юнит-экономики
        env:
          STORE_INPUT_RAW: ${{ github.event.inputs.store }}
        run: |
          STORE_INPUT="$STORE_INPUT_RAW"

          if [ -z "$STORE_INPUT" ]; then
            STORE_INPUT="ALL"
          fi

          echo "STORE_INPUT=$STORE_INPUT"

          status=0

          run_store() {
            local store="$1"
            echo "===== Расчет юнит-экономики: STORE=$store ====="
            WB_STORE="$store" python raschet_unit_ekonomiki.py || status=1
          }

          if [ "$STORE_INPUT" = "ALL" ]; then
            run_store "TOPFACE"
            run_store "MISSTAIS"
          elif [ "$STORE_INPUT" = "TOPFACE" ]; then
            run_store "TOPFACE"
          elif [ "$STORE_INPUT" = "MISSTAIS" ]; then
            run_store "MISSTAIS"
          else
            echo "::error::Неизвестный STORE_INPUT=$STORE_INPUT"
            exit 1
          fi

          exit "$status"
