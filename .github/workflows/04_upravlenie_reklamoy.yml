name: WB Ads Manager TOPFACE

on:
  workflow_dispatch:
  schedule:
    # GitHub cron работает в UTC. Москва = UTC+3.
    # Ночной эксперимент: 01:05 МСК -> 22:05 UTC предыдущего дня.
    - cron: "5 22 * * *"
    # Ночной эксперимент: 05:05 МСК -> 02:05 UTC.
    - cron: "5 2 * * *"
    # Основной контур: каждые 10 минут с 18:00 до 23:50 МСК.
    # Если GitHub задержит job после 00:00 МСК, MSK time guard заблокирует запуск до Python/API.
    - cron: "*/10 15-20 * * *"
    # Telegram по проблемным кистям: понедельник 19:05, затем каждые 10 минут до 23:55 МСК.
    - cron: "5,15,25,35,45,55 16-20 * * 1"

permissions:
  contents: read

concurrency:
  group: wb-ads-manager-topface-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKFLOW_VERSION: "v63_schedule_new_ramp_tg_2026-06-18"
  WORKFLOW_FILE: ".github/workflows/04_upravlenie_reklamoy.yml"
  PYTHON_VERSION: "3.11"
  STORE_NAME: "TOPFACE"
  DAILY_LOCK_PREFIX: "Служебные файлы/Ассистент WB/TOPFACE/locks"

jobs:
  wb_ads_manager:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Workflow identity diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Workflow identity diagnostics ==="
          echo "WORKFLOW_VERSION=${WORKFLOW_VERSION}"
          echo "WORKFLOW_FILE=${WORKFLOW_FILE}"
          echo "GITHUB_WORKFLOW=${GITHUB_WORKFLOW}"
          echo "github.workflow_ref=${{ github.workflow_ref }}"
          echo "github.workflow_sha=${{ github.workflow_sha }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.event_name=${{ github.event_name }}"
          echo "github.event.schedule=${{ github.event.schedule }}"
          echo "UTC now=$(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Europe/Moscow date '+MSK now=%Y-%m-%d %H:%M:%S'
          echo "=== Workflow file hash and markers ==="
          if [[ -f "${WORKFLOW_FILE}" ]]; then
            sha256sum "${WORKFLOW_FILE}"
            grep -nE "WORKFLOW_VERSION|cron:|18:|19:05|01:05|05:05|МСК|RUN_SLOT|brush_tg" "${WORKFLOW_FILE}" || true
          else
            echo "WARNING: ${WORKFLOW_FILE} not found after checkout"
            find .github/workflows -maxdepth 1 -type f -print || true
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas openpyxl boto3 requests numpy

      - name: Resolve slot and guard time
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          event_name = "${{ github.event_name }}"
          schedule = "${{ github.event.schedule }}"
          now_msk = datetime.now(ZoneInfo("Europe/Moscow"))
          minutes = now_msk.hour * 60 + now_msk.minute
          weekday = now_msk.weekday()  # Monday=0

          run_slot = "manual_main"
          allowed = True
          reason = "manual_dispatch_single_mode"
          lock_name = f"manual_main_{now_msk:%Y-%m-%d_%H%M%S}"

          if event_name == "schedule":
              if schedule == "5 22 * * *":
                  run_slot = "night_start"
                  allowed = (1 * 60) <= minutes <= (1 * 60 + 35)
                  reason = "night_start_0105_msk_window" if allowed else "BLOCKED_NIGHT_START_TIME_GUARD"
                  lock_name = f"night_start_{now_msk:%Y-%m-%d}"
              elif schedule == "5 2 * * *":
                  run_slot = "night_end"
                  allowed = (5 * 60) <= minutes <= (5 * 60 + 35)
                  reason = "night_end_0505_msk_window" if allowed else "BLOCKED_NIGHT_END_TIME_GUARD"
                  lock_name = f"night_end_{now_msk:%Y-%m-%d}"
              elif schedule == "5,15,25,35,45,55 16-20 * * 1":
                  run_slot = "brush_tg"
                  allowed = (weekday == 0) and ((19 * 60 + 5) <= minutes <= (23 * 60 + 59))
                  reason = "brush_tg_monday_1905_2359_msk_window" if allowed else "BLOCKED_BRUSH_TG_TIME_GUARD"
                  lock_name = f"brush_tg_{now_msk:%Y-%m-%d}"
              else:
                  run_slot = "main_run"
                  allowed = 18 <= now_msk.hour <= 23
                  reason = "main_18_00_23_59_msk_window" if allowed else "BLOCKED_MAIN_TIME_GUARD"
                  lock_name = f"main_run_{now_msk:%Y-%m-%d}"

          print("=== Slot resolution ===")
          print(f"event_name={event_name}")
          print(f"schedule={schedule}")
          print(f"MSK now={now_msk:%Y-%m-%d %H:%M:%S}")
          print(f"resolved_run_slot={run_slot}")
          print(f"run_allowed={allowed}")
          print(f"guard_reason={reason}")
          print(f"lock_name={lock_name}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"RUN_SLOT={run_slot}\n")
              f.write(f"RUN_ALLOWED={'true' if allowed else 'false'}\n")
              f.write(f"GUARD_REASON={reason}\n")
              f.write(f"MSK_RUN_DATE={now_msk:%Y-%m-%d}\n")
              f.write(f"LOCK_NAME={lock_name}\n")
          PY

      - name: Stop if blocked by time guard
        if: env.RUN_ALLOWED != 'true'
        shell: bash
        run: |
          echo "${GUARD_REASON}: запуск заблокирован до старта Python. WB API не трогаем."
          exit 0

      - name: Check schedule marker
        if: github.event_name == 'schedule' && env.RUN_ALLOWED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import boto3
          from botocore.exceptions import ClientError

          bucket = os.environ["YC_BUCKET_NAME"]
          lock_key = f"{os.environ['DAILY_LOCK_PREFIX']}/{os.environ['LOCK_NAME']}.json"
          s3 = boto3.client(
              "s3",
              endpoint_url="https://storage.yandexcloud.net",
              aws_access_key_id=os.environ["YC_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["YC_SECRET_ACCESS_KEY"],
          )
          already_done = False
          try:
              s3.head_object(Bucket=bucket, Key=lock_key)
              already_done = True
          except ClientError as exc:
              code = str(exc.response.get("Error", {}).get("Code", ""))
              if code not in {"404", "NoSuchKey", "NotFound"}:
                  raise
          print("=== Marker check ===")
          print(f"lock_key={lock_key}")
          print(f"already_done={already_done}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"SCHEDULE_ALREADY_DONE={'true' if already_done else 'false'}\n")
              f.write(f"SCHEDULE_LOCK_KEY={lock_key}\n")
          PY

      - name: Stop if schedule already completed
        if: github.event_name == 'schedule' && env.SCHEDULE_ALREADY_DONE == 'true'
        shell: bash
        run: |
          echo "Schedule already completed: ${SCHEDULE_LOCK_KEY}"
          exit 0

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile upravlenie_reklamoy.py

      - name: Run WB Ads Manager
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Run command resolution ==="
          echo "WORKFLOW_VERSION=${WORKFLOW_VERSION}"
          echo "RUN_SLOT=${RUN_SLOT}"
          echo "GUARD_REASON=${GUARD_REASON}"
          TZ=Europe/Moscow date '+MSK before run=%Y-%m-%d %H:%M:%S'

          case "${RUN_SLOT}" in
            manual_main)
              CMD="python upravlenie_reklamoy.py run --skip-price --apply-pause --apply-start --send-brush-tg --force-brush-tg"
              ;;
            main_run)
              CMD="python upravlenie_reklamoy.py run --skip-price --apply-pause --apply-start --send-brush-tg --brush-tg-schedule-only"
              ;;
            brush_tg)
              CMD="python upravlenie_reklamoy.py preview --skip-price --send-brush-tg --brush-tg-schedule-only"
              ;;
            night_start)
              CMD="python upravlenie_reklamoy.py run --skip-price --night-experiment-only --night-experiment-slot start --apply-pause"
              ;;
            night_end)
              CMD="python upravlenie_reklamoy.py run --skip-price --night-experiment-only --night-experiment-slot end --apply-start"
              ;;
            *)
              echo "Unknown RUN_SLOT=${RUN_SLOT}"
              exit 2
              ;;
          esac
          echo "Running: ${CMD}"
          eval "${CMD}"
          TZ=Europe/Moscow date '+MSK after run=%Y-%m-%d %H:%M:%S'

      - name: Write schedule marker after success
        if: success() && github.event_name == 'schedule' && env.RUN_ALLOWED == 'true' && env.SCHEDULE_ALREADY_DONE != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import json
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          import boto3

          bucket = os.environ["YC_BUCKET_NAME"]
          lock_key = os.environ["SCHEDULE_LOCK_KEY"]
          payload = {
              "workflow_version": os.environ.get("WORKFLOW_VERSION"),
              "workflow_file": os.environ.get("WORKFLOW_FILE"),
              "run_slot": os.environ.get("RUN_SLOT"),
              "guard_reason": os.environ.get("GUARD_REASON"),
              "github_workflow": os.environ.get("GITHUB_WORKFLOW"),
              "github_sha": "${{ github.sha }}",
              "github_ref": "${{ github.ref }}",
              "github_workflow_ref": "${{ github.workflow_ref }}",
              "github_workflow_sha": "${{ github.workflow_sha }}",
              "utc_completed_at": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S"),
              "msk_completed_at": datetime.now(ZoneInfo("Europe/Moscow")).strftime("%Y-%m-%d %H:%M:%S"),
          }
          s3 = boto3.client(
              "s3",
              endpoint_url="https://storage.yandexcloud.net",
              aws_access_key_id=os.environ["YC_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["YC_SECRET_ACCESS_KEY"],
          )
          s3.put_object(Bucket=bucket, Key=lock_key, Body=json.dumps(payload, ensure_ascii=False, indent=2).encode("utf-8"), ContentType="application/json")
          print(f"Marker written: {lock_key}")
          PY

      - name: Upload GitHub artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wb-ads-manager-${{ env.RUN_SLOT }}-${{ github.run_number }}
          if-no-files-found: ignore
          path: |
            Предпросмотр_последнего_запуска.xlsx
            Итог_последнего_запуска.xlsx
            Сводка_последнего_запуска.json
            Лог_API.xlsx
            История_ставок.xlsx
            История_пауз.xlsx
            Проблемные_кисти_TG.xlsx
