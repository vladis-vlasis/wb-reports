name: TOPFACE WB Ads Manager

on:
  workflow_dispatch:
    inputs:
      run_slot:
        description: "Что запустить вручную"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - night_start
          - night_end
      dry_run:
        description: "Dry-run: рассчитать без отправки в WB"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    # GitHub Actions cron работает в UTC.
    # МСК = UTC+3.
    - cron: "0 22 * * *"  # 01:00 МСК — ночные эксперименты: минимальные ставки + pause combined с ДРР > 15%
    - cron: "0 2 * * *"   # 05:00 МСК — ночные эксперименты: вернуть paused combined после окна
    - cron: "0 9 * * *"   # 12:00 МСК — основной дневной запуск алгоритма

jobs:
  run-topface-ads-manager:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # Можно хранить секреты двумя способами:
      # 1) отдельными GitHub Secrets: YC_ACCESS_KEY_ID / YC_SECRET_ACCESS_KEY / YC_BUCKET_NAME / WB_PROMO_KEY_TOPFACE
      # 2) одним многострочным секретом REPORT_ENV в формате KEY=VALUE
      REPORT_ENV: ${{ secrets.REPORT_ENV }}
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
      PYTHONUNBUFFERED: "1"
      TZ: "Europe/Moscow"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas openpyxl xlsxwriter requests boto3 python-dateutil numpy pytz

      - name: Load secrets from REPORT_ENV if needed
        run: |
          python - <<'PY'
          import os

          allowed = [
              "YC_ACCESS_KEY_ID",
              "YC_SECRET_ACCESS_KEY",
              "YC_BUCKET_NAME",
              "WB_PROMO_KEY_TOPFACE",
          ]

          report_env = os.getenv("REPORT_ENV", "") or ""
          parsed = {}
          for raw_line in report_env.splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#"):
                  continue
              if line.startswith("export "):
                  line = line[len("export "):].strip()
              if "=" not in line:
                  continue
              key, value = line.split("=", 1)
              key = key.strip()
              value = value.strip().strip('"').strip("'")
              if key in allowed and value:
                  parsed[key] = value

          github_env = os.environ.get("GITHUB_ENV")
          if not github_env:
              raise SystemExit("GITHUB_ENV is not available")

          loaded = []
          with open(github_env, "a", encoding="utf-8") as f:
              for key in allowed:
                  # Отдельный secret имеет приоритет. REPORT_ENV используется как fallback.
                  value = os.getenv(key) or parsed.get(key)
                  if value:
                      f.write(f"{key}={value}\n")
                      loaded.append(key)

          print("Loaded secret names: " + ", ".join(loaded))
          PY

      - name: Verify required secrets
        run: |
          python - <<'PY'
          import os

          required = [
              "YC_ACCESS_KEY_ID",
              "YC_SECRET_ACCESS_KEY",
              "YC_BUCKET_NAME",
              "WB_PROMO_KEY_TOPFACE",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit("Missing secrets: " + ", ".join(missing))
          print("All required secrets are present.")
          PY

      - name: Resolve script file
        run: |
          set -euo pipefail
          echo "=== Current directory ==="
          pwd
          echo "=== Repository files ==="
          ls -la

          SCRIPT_PATH=""
          if [ -f "upravlenie_reklamoy.py" ]; then
            SCRIPT_PATH="upravlenie_reklamoy.py"
          elif [ -f "assistant_wb_ads_manager.py" ]; then
            SCRIPT_PATH="assistant_wb_ads_manager.py"
          else
            echo "ERROR: Не найден файл скрипта. Ожидал upravlenie_reklamoy.py или assistant_wb_ads_manager.py в корне репозитория"
            exit 1
          fi

          echo "SCRIPT_PATH=$SCRIPT_PATH" >> "$GITHUB_ENV"
          echo "Resolved script: $SCRIPT_PATH"

          echo "=== Script version marker ==="
          grep -n "SCRIPT_VERSION" "$SCRIPT_PATH" || true

          echo "=== Old dayfirst bug check ==="
          if grep -q "dayfirst=True" "$SCRIPT_PATH"; then
            echo "ERROR: В репозитории всё ещё старая версия $SCRIPT_PATH с dayfirst=True"
            exit 1
          fi

          if ! grep -q "strict-drr-v29-night-experiment-only-yml-2026-06-09" "$SCRIPT_PATH"; then
            echo "ERROR: В $SCRIPT_PATH нет маркера v29. Значит в репозитории лежит не актуальная версия кода."
            exit 1
          fi

          echo "=== Script SHA256 ==="
          sha256sum "$SCRIPT_PATH"

      - name: Compile Python script
        run: |
          python -m py_compile "$SCRIPT_PATH"

      - name: Run TOPFACE WB Ads Manager
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_CRON: ${{ github.event.schedule || '' }}
          INPUT_RUN_SLOT: ${{ github.event.inputs.run_slot || 'main' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          CMD="python $SCRIPT_PATH run --skip-price"
          SLOT="main"

          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$SCHEDULE_CRON" in
              "0 22 * * *")
                SLOT="night_start"
                CMD="$CMD --night-experiment-only --apply-pause"
                ;;
              "0 2 * * *")
                SLOT="night_end"
                CMD="$CMD --night-experiment-only --apply-start"
                ;;
              "0 9 * * *")
                SLOT="main"
                ;;
              *)
                echo "ERROR: неизвестное расписание: $SCHEDULE_CRON"
                exit 1
                ;;
            esac
          else
            case "$INPUT_RUN_SLOT" in
              "night_start")
                SLOT="night_start"
                CMD="$CMD --night-experiment-only --apply-pause"
                ;;
              "night_end")
                SLOT="night_end"
                CMD="$CMD --night-experiment-only --apply-start"
                ;;
              "main"|"")
                SLOT="main"
                ;;
              *)
                echo "ERROR: неизвестный run_slot: $INPUT_RUN_SLOT"
                exit 1
                ;;
            esac
          fi

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Event: $EVENT_NAME"
          echo "Schedule cron: $SCHEDULE_CRON"
          echo "Resolved slot: $SLOT"
          echo "Resolved script: $SCRIPT_PATH"
          echo "Running: $CMD"
          eval "$CMD"

      - name: Show local result files
        if: always()
        run: |
          echo "=== Local XLSX/JSON files after run ==="
          find . -maxdepth 3 -type f \( -name "*.xlsx" -o -name "*.json" \) -print || true

      - name: Upload local artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-ads-manager-results
          path: |
            *.xlsx
            *.json
            **/Итог_последнего_запуска*.xlsx
            **/Предпросмотр_последнего_запуска*.xlsx
            **/Сводка_последнего_запуска*.json
            **/Лог_API*.xlsx
            **/История_ставок*.xlsx
            **/История_пауз*.xlsx
          if-no-files-found: warn
          retention-days: 14
