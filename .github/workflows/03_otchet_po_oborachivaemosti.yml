# VERSION: v14_MT_ONLY_REDISTRIBUTION_20260610
# В GitHub заменить содержимое файла:
# .github/workflows/03_otchet_po_oborachivaemosti.yml
#
# Логика:
# TOPFACE  -> полный отчёт по остаткам/оборачиваемости + перераспределение
# MISSTAIS -> только перераспределение, без отчёта по оборачиваемости

name: Отчет по оборачиваемости и перераспределение

on:
  workflow_dispatch:
  schedule:
    # Каждый понедельник в 10:00 МСК = 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  run:
    name: Запустить отчет и перераспределение
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Загрузить REPORT_ENV и secrets
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
          WB_KEY_MISSTAIS: ${{ secrets.WB_KEY_MISSTAIS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TORGSTAT_ABC_URL: ${{ secrets.TORGSTAT_ABC_URL }}
        run: |
          echo "YML_VERSION=v14_MT_ONLY_REDISTRIBUTION_20260610"

          if [ -z "$REPORT_ENV" ]; then
            echo "::error::Не задан secret REPORT_ENV"
            exit 1
          fi

          printf '%s\n' "$REPORT_ENV" | sed 's/\r$//' >> "$GITHUB_ENV"

          if [ -n "$WB_PROMO_KEY_TOPFACE" ]; then
            echo "WB_PROMO_KEY_TOPFACE=$WB_PROMO_KEY_TOPFACE" >> "$GITHUB_ENV"
          fi

          if [ -n "$WB_KEY_MISSTAIS" ]; then
            echo "WB_KEY_MISSTAIS=$WB_KEY_MISSTAIS" >> "$GITHUB_ENV"
          fi

          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> "$GITHUB_ENV"
          fi

          if [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> "$GITHUB_ENV"
          fi

          if [ -n "$TORGSTAT_ABC_URL" ]; then
            echo "TORGSTAT_ABC_URL=$TORGSTAT_ABC_URL" >> "$GITHUB_ENV"
          fi

      - name: TOPFACE — полный отчет и перераспределение
        run: |
          echo "===== STORE=TOPFACE | FULL REPORT + REDISTRIBUTION ====="
          WB_STORE="TOPFACE" python otchet_po_oborachivaemosti.py

      - name: MISSTAIS — только перераспределение
        run: |
          echo "===== STORE=MISSTAIS | REDISTRIBUTION ONLY ====="
          WB_STORE="MISSTAIS" WB_ONLY_REDISTRIBUTION="true" WB_SEND_REDISTRIBUTION_ALWAYS="true" python otchet_po_oborachivaemosti.py
