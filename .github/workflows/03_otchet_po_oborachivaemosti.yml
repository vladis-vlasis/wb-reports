# VERSION: v17_TF_REPORT_MT_TF_REDISTRIBUTION_MIN4_20260610
# В GitHub заменить содержимое файла:
# .github/workflows/03_otchet_po_oborachivaemosti.yml
#
# Каждый понедельник:
# 1) TOPFACE  -> отчёт по остаткам и товарам в пути + перераспределение
# 2) MISSTAIS -> только перераспределение
#
# Планка попадания строк в шаблон перераспределения: от 4 шт.

name: Отчет по остаткам и перераспределение

on:
  workflow_dispatch:
  schedule:
    # Каждый понедельник в 10:00 МСК = 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  run:
    name: TOPFACE отчет + перераспределение; MISSTAIS перераспределение
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Загрузить REPORT_ENV и secrets
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "YML_VERSION=v17_TF_REPORT_MT_TF_REDISTRIBUTION_MIN4_20260610"

          if [ -z "$REPORT_ENV" ]; then
            echo "::error::Не задан secret REPORT_ENV"
            exit 1
          fi

          printf '%s\n' "$REPORT_ENV" | sed 's/\r$//' >> "$GITHUB_ENV"

          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> "$GITHUB_ENV"
          fi

          if [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> "$GITHUB_ENV"
          fi

      - name: Проверить переменные Yandex Cloud
        run: |
          missing=0
          for var in YC_ACCESS_KEY_ID YC_SECRET_ACCESS_KEY YC_BUCKET_NAME; do
            if [ -z "${!var}" ]; then
              echo "::error::После загрузки REPORT_ENV не найдена переменная $var"
              missing=1
            else
              echo "$var найден"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: TOPFACE — отчет по остаткам и товарам в пути + перераспределение
        run: |
          echo "===== STORE=TOPFACE | REPORT + REDISTRIBUTION | MIN_QTY=4 ====="
          WB_STORE="TOPFACE"           WB_FORCE_SEND="true"           WB_SEND_REDISTRIBUTION_ALWAYS="true"           WB_REDISTRIBUTION_MIN_QTY="4"           python otchet_po_oborachivaemosti.py

      - name: MISSTAIS — только перераспределение
        run: |
          echo "===== STORE=MISSTAIS | REDISTRIBUTION ONLY | MIN_QTY=4 ====="
          WB_STORE="MISSTAIS"           WB_ONLY_REDISTRIBUTION="true"           WB_SEND_REDISTRIBUTION_ALWAYS="true"           WB_REDISTRIBUTION_MIN_QTY="4"           python otchet_po_oborachivaemosti.py
