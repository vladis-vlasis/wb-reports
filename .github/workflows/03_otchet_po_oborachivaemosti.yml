name: Отчет по оборачиваемости

on:
  workflow_dispatch:
  schedule:
    # Каждый понедельник в 12:00 МСК = 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  run:
    name: Запустить отчет по оборачиваемости
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Запустить отчет по оборачиваемости
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python otchet_po_oborachivaemosti.py
