name: Download Torgstat ABC

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "auto = daily every run + weekly on Monday; daily/weekly/mtd/custom for manual runs"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - daily
          - weekly
          - mtd
          - custom
      store:
        description: "Store code"
        required: true
        default: "TOPFACE"
        type: string
      date_from:
        description: "Only for custom/daily manual override: YYYY-MM-DD or DD.MM.YYYY"
        required: false
        default: ""
        type: string
      date_to:
        description: "Only for custom: YYYY-MM-DD or DD.MM.YYYY"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Parse cURL and replace dates, but do not download/upload"
        required: true
        default: false
        type: boolean
  schedule:
    # GitHub cron is UTC. 06:30 UTC = 09:30 MSK.
    # The script itself uses yesterday as the target date.
    - cron: "30 6 * * *"

jobs:
  download-abc:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      REPORT_ENV: ${{ secrets.REPORT_ENV }}
      TORGSTAT_ABC_CURL: ${{ secrets.TORGSTAT_ABC_CURL }}
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ENDPOINT_URL: ${{ secrets.YC_ENDPOINT_URL }}
      MODE: ${{ github.event.inputs.mode || 'auto' }}
      STORE: ${{ github.event.inputs.store || 'TOPFACE' }}
      DATE_FROM: ${{ github.event.inputs.date_from || '' }}
      DATE_TO: ${{ github.event.inputs.date_to || '' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      REPORTS_ROOT: "Отчёты"
      ABC_FOLDER: "АБС анализ"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests boto3 openpyxl

      - name: Verify downloader version
        run: |
          set -euo pipefail
          test -f download_torgstat_abc.py
          head -n 1 download_torgstat_abc.py
          grep -q "TORGSTAT_ABC_AUTH_PARSE_FIX_20260528" download_torgstat_abc.py
          python -m py_compile download_torgstat_abc.py
          python download_torgstat_abc.py --self-test

      - name: Download and upload ABC report
        run: |
          set -euo pipefail
          ARGS=(--mode "$MODE" --store "$STORE")
          if [ -n "$DATE_FROM" ]; then ARGS+=(--date-from "$DATE_FROM"); fi
          if [ -n "$DATE_TO" ]; then ARGS+=(--date-to "$DATE_TO"); fi
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          python download_torgstat_abc.py "${ARGS[@]}"
