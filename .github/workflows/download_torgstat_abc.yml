
name: TOPFACE download Torgstat ABC
# FIX37_READY_GITHUB_UPLOAD_20260611: active ABC workflow. Upload as .github/workflows/download_torgstat_abc.yml

on:
  schedule:
    # Каждый день в 13:30 по Москве / 10:30 UTC.
    # В режиме auto: только daily; по понедельникам дополнительно закрытая неделя Mon-Sun. MTD 01.MM-факт день больше не выгружаем.
    - cron: "30 10 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим выгрузки ABC"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - daily
          - weekly
          - custom
      date_from:
        description: "Дата начала для custom/daily: YYYY-MM-DD"
        required: false
        default: ""
      date_to:
        description: "Дата окончания для custom: YYYY-MM-DD"
        required: false
        default: ""
      dry_run:
        description: "Только проверить cURL и период, без скачивания/загрузки"
        required: false
        default: false
        type: boolean

jobs:
  download-abc:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      REPORT_ENV: ${{ secrets.REPORT_ENV }}
      TORGSTAT_ABC_CURL: ${{ secrets.TORGSTAT_ABC_CURL }}
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ENDPOINT_URL: ${{ secrets.YC_ENDPOINT_URL }}
      AWS_DEFAULT_REGION: ru-central1
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install requests boto3 openpyxl

      - name: Show planned schedule time
        shell: bash
        run: |
          set -euo pipefail
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "MSK now: $(TZ=Europe/Moscow date '+%Y-%m-%d %H:%M:%S')"
          echo "Workflow cron must be 30 10 * * * = 13:30 MSK"

      - name: Download and upload ABC
        shell: bash
        run: |
          set -euo pipefail

          MODE="${{ github.event.inputs.mode || 'auto' }}"
          DATE_FROM="${{ github.event.inputs.date_from || '' }}"
          DATE_TO="${{ github.event.inputs.date_to || '' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS=(--mode "$MODE" --store TOPFACE --reports-root "Отчёты" --abc-folder "ABC")

          if [ -n "$DATE_FROM" ]; then
            ARGS+=(--date-from "$DATE_FROM")
          fi
          if [ -n "$DATE_TO" ]; then
            ARGS+=(--date-to "$DATE_TO")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          echo "ABC mode=$MODE date_from=$DATE_FROM date_to=$DATE_TO dry_run=$DRY_RUN"
          python download_torgstat_abc.py "${ARGS[@]}"
