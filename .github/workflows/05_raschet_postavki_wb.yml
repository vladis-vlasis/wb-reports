# VERSION: v18_CORRECT_WB_STORE_TOPFACE_MT_20260610
# В GitHub заменить содержимое файла:
# .github/workflows/05_raschet_postavki_wb.yml
#
# Важно:
# - текущий файл Поставки.py принимает магазин только через WB_STORE;
# - магазин передаётся через переменную окружения WB_STORE;
# - REPORT_ENV читается по старой рабочей схеме;
# - поддержаны TOPFACE, MISSTAIS и ALL.

name: Расчет поставки WB

on:
  workflow_dispatch:
    inputs:
      store:
        description: "Магазин"
        required: true
        default: "TOPFACE"
        type: choice
        options:
          - TOPFACE
          - MISSTAIS
          - ALL
      mode:
        description: "Режим расчета"
        required: true
        default: "warehouse"
        type: choice
        options:
          - warehouse
          - supply
          - supplier
      run_date:
        description: "Дата расчета YYYY-MM-DD. Если пусто — сегодня"
        required: false
        default: ""
        type: string
      season_coeff:
        description: "Коэффициент сезонности для warehouse/supply-режима"
        required: false
        default: "1.0"
        type: string
      strategy_mode:
        description: "Стратегия распределения для warehouse/supply-режима"
        required: false
        default: "default"
        type: choice
        options:
          - default
          - economy
      send_telegram:
        description: "Отправлять результат в Telegram"
        required: true
        default: true
        type: boolean
      supplier_default_coeff:
        description: "Коэффициент по умолчанию для supplier-режима"
        required: false
        default: "1.0"
        type: string
      supplier_lead_days:
        description: "Срок приезда заказа от производителя, дней"
        required: false
        default: "80"
        type: string
      supplier_coverage_days:
        description: "Покрытие после приезда, дней"
        required: false
        default: "60"
        type: string
      supplier_breakthrough_threshold:
        description: "Порог Прорыв для supplier-режима"
        required: false
        default: "1.5"
        type: string
      abc_target_month:
        description: "Месяц ABC YYYY-MM"
        required: false
        default: "2026-03"
        type: string

jobs:
  run:
    name: Запустить расчет поставки WB
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Загрузить переменные из REPORT_ENV и отдельных secrets
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "YML_VERSION=v18_CORRECT_WB_STORE_TOPFACE_MT_20260610"

          if [ -z "$REPORT_ENV" ]; then
            echo "::error::Не задан secret REPORT_ENV"
            exit 1
          fi

          printf '%s\n' "$REPORT_ENV" | sed 's/\r$//' >> "$GITHUB_ENV"

          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> "$GITHUB_ENV"
          fi

          if [ -n "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> "$GITHUB_ENV"
          fi

          echo "WB_OUTPUT_DIR=output" >> "$GITHUB_ENV"
          echo "WB_SEND_TELEGRAM=${{ inputs.send_telegram }}" >> "$GITHUB_ENV"

      - name: Проверить обязательные переменные
        run: |
          missing=0

          for var in YC_ACCESS_KEY_ID YC_SECRET_ACCESS_KEY YC_BUCKET_NAME; do
            if [ -z "${!var}" ]; then
              echo "::error::Не найдена переменная $var. Проверь secret REPORT_ENV"
              missing=1
            else
              echo "$var найден"
            fi
          done

          if [ "${WB_SEND_TELEGRAM}" = "true" ]; then
            for var in TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
              if [ -z "${!var}" ]; then
                echo "::error::Не найдена переменная $var. Она нужна для отправки в Telegram"
                missing=1
              else
                echo "$var найден"
              fi
            done
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Найти файл скрипта
        run: |
          if [ -f "Поставки.py" ]; then
            echo "SUPPLY_SCRIPT=Поставки.py" >> "$GITHUB_ENV"
          elif [ -f "wb_supply_calculator.py" ]; then
            echo "SUPPLY_SCRIPT=wb_supply_calculator.py" >> "$GITHUB_ENV"
          else
            echo "::error::Не найден файл Поставки.py или wb_supply_calculator.py в корне репозитория"
            exit 1
          fi

      - name: Запустить расчет поставки WB
        env:
          STORE_INPUT: ${{ inputs.store }}
          MODE_INPUT: ${{ inputs.mode }}
          RUN_DATE_INPUT: ${{ inputs.run_date }}
          SEASON_COEFF_INPUT: ${{ inputs.season_coeff }}
          STRATEGY_MODE_INPUT: ${{ inputs.strategy_mode }}
          SUPPLIER_DEFAULT_COEFF_INPUT: ${{ inputs.supplier_default_coeff }}
          SUPPLIER_LEAD_DAYS_INPUT: ${{ inputs.supplier_lead_days }}
          SUPPLIER_COVERAGE_DAYS_INPUT: ${{ inputs.supplier_coverage_days }}
          SUPPLIER_BREAKTHROUGH_THRESHOLD_INPUT: ${{ inputs.supplier_breakthrough_threshold }}
          ABC_TARGET_MONTH_INPUT: ${{ inputs.abc_target_month }}
        run: |
          echo "STORE_INPUT=$STORE_INPUT"
          echo "MODE_INPUT=$MODE_INPUT"

          status=0

          run_store() {
            local store="$1"
            echo "===== Расчет поставки WB: STORE=$store | MODE=$MODE_INPUT ====="

            ARGS=()
            ARGS+=(--mode "$MODE_INPUT")
            ARGS+=(--season-coeff "$SEASON_COEFF_INPUT")
            ARGS+=(--strategy-mode "$STRATEGY_MODE_INPUT")
            ARGS+=(--supplier-default-coeff "$SUPPLIER_DEFAULT_COEFF_INPUT")
            ARGS+=(--supplier-lead-days "$SUPPLIER_LEAD_DAYS_INPUT")
            ARGS+=(--supplier-coverage-days "$SUPPLIER_COVERAGE_DAYS_INPUT")
            ARGS+=(--supplier-breakthrough-threshold "$SUPPLIER_BREAKTHROUGH_THRESHOLD_INPUT")
            ARGS+=(--abc-target-month "$ABC_TARGET_MONTH_INPUT")

            if [ -n "$RUN_DATE_INPUT" ]; then
              ARGS+=(--run-date "$RUN_DATE_INPUT")
            fi

            WB_STORE="$store" python "$SUPPLY_SCRIPT" "${ARGS[@]}" || status=1
          }

          if [ "$STORE_INPUT" = "ALL" ]; then
            run_store "TOPFACE"
            run_store "MISSTAIS"
          elif [ "$STORE_INPUT" = "TOPFACE" ]; then
            run_store "TOPFACE"
          elif [ "$STORE_INPUT" = "MISSTAIS" ]; then
            run_store "MISSTAIS"
          else
            echo "::error::Неизвестный STORE_INPUT=$STORE_INPUT"
            exit 1
          fi

          exit "$status"

      - name: Сохранить результат как artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rezultat-rascheta-postavki-wb
          path: output/
          if-no-files-found: ignore
