name: Ежедневное обновление данных

on:
  workflow_dispatch:
    inputs:
      store:
        description: "Магазин"
        required: true
        default: "ALL"
        type: choice
        options:
          - ALL
          - TOPFACE
          - MISSTAIS
  schedule:
    # Каждый день в 10:00 МСК = 07:00 UTC
    - cron: "0 7 * * *"

jobs:
  run:
    name: Запустить ежедневное обновление данных
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Загрузить переменные из REPORT_ENV и secrets магазинов
        env:
          REPORT_ENV: ${{ secrets.REPORT_ENV }}
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
          WB_KEY_MISSTAIS: ${{ secrets.WB_KEY_MISSTAIS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TORGSTAT_ABC_URL: ${{ secrets.TORGSTAT_ABC_URL }}
        run: |
          if [ -z "$REPORT_ENV" ]; then
            echo "::error::Не задан secret REPORT_ENV"
            exit 1
          fi

          printf '%s\n' "$REPORT_ENV" | sed 's/\r$//' >> "$GITHUB_ENV"

          [ -n "$WB_PROMO_KEY_TOPFACE" ] && echo "WB_PROMO_KEY_TOPFACE=$WB_PROMO_KEY_TOPFACE" >> "$GITHUB_ENV"
          [ -n "$WB_KEY_MISSTAIS" ] && echo "WB_KEY_MISSTAIS=$WB_KEY_MISSTAIS" >> "$GITHUB_ENV"
          [ -n "$TELEGRAM_BOT_TOKEN" ] && echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN" >> "$GITHUB_ENV"
          [ -n "$TELEGRAM_CHAT_ID" ] && echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID" >> "$GITHUB_ENV"
          [ -n "$TORGSTAT_ABC_URL" ] && echo "TORGSTAT_ABC_URL=$TORGSTAT_ABC_URL" >> "$GITHUB_ENV"

      - name: Проверить обязательные переменные
        run: |
          missing=0
          for var in YC_ACCESS_KEY_ID YC_SECRET_ACCESS_KEY YC_BUCKET_NAME WB_PROMO_KEY_TOPFACE WB_KEY_MISSTAIS; do
            if [ -z "${!var}" ]; then
              echo "::error::Не найдена переменная $var"
              missing=1
            fi
          done
          [ "$missing" -ne 0 ] && exit 1 || true

      - name: Запустить ежедневное обновление данных
        run: |
          python ezhednevnoe_obnovlenie_dannyh.py --full --store "${{ inputs.store || 'ALL' }}"
