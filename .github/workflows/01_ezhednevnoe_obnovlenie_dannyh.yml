# version: v29_every10m_target_date_rule_manual_ok
# Заменить файл в репозитории:
# .github/workflows/01_ezhednevnoe_obnovlenie_dannyh.yml

name: Ежедневное обновление данных

on:
  workflow_dispatch:
    inputs:
      store:
        description: "Магазин"
        required: true
        default: "ALL"
        type: choice
        options:
          - ALL
          - TOPFACE
          - MISSTAIS
      target_date:
        description: "Целевая дата выгрузки YYYY-MM-DD. Пусто = авто-правило: до 14:00 МСК позавчера, после 14:00 МСК вчера."
        required: false
        default: ""
        type: string
  schedule:
    # GitHub cron работает в UTC.
    # Запускаем проверку каждые 10 минут круглосуточно.
    # Сам Python не блокируется временем:
    # - до 14:00 МСК выгружает предыдущий полный день = позавчера;
    # - после 14:00 МСК выгружает вчера.
    # Повторные schedule-запуски отсекаются marker-файлом по целевой дате.
    - cron: "*/10 * * * *"

concurrency:
  # schedule и manual разделены. Ручной запуск не блокируется автозапуском.
  group: daily-update-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  run:
    name: Ежедневное обновление данных
    runs-on: ubuntu-latest
    timeout-minutes: 570

    env:
      TZ: Europe/Moscow
      STORE_INPUT: ${{ github.event.inputs.store || 'ALL' }}
      TARGET_DATE_INPUT: ${{ github.event.inputs.target_date || '' }}

      REPORT_ENV: ${{ secrets.REPORT_ENV }}
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ENDPOINT_URL: ${{ secrets.YC_ENDPOINT_URL }}
      WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
      WB_KEY_MISSTAIS: ${{ secrets.WB_KEY_MISSTAIS }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TORGSTAT_ABC_URL: ${{ secrets.TORGSTAT_ABC_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target date
        id: target_date
        shell: bash
        run: |
          set -euo pipefail
          echo "YML_VERSION=v29_every10m_target_date_rule_manual_ok"
          python - <<'PY'
          import os
          import re
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          raw_target = (os.environ.get("TARGET_DATE_INPUT", "") or "").strip()
          now_msk = datetime.now(ZoneInfo("Europe/Moscow"))

          if raw_target:
              if not re.fullmatch(r"\d{4}-\d{2}-\d{2}", raw_target):
                  raise SystemExit(f"target_date должен быть в формате YYYY-MM-DD, получено: {raw_target}")
              target_date = raw_target
              rule = "manual_input_target_date"
          else:
              shift_days = 1 if now_msk.hour >= 14 else 2
              target_date = (now_msk.date() - timedelta(days=shift_days)).strftime("%Y-%m-%d")
              rule = "auto_after_14_yesterday_before_14_day_before_yesterday"

          print("=== Target date resolution ===")
          print(f"event_name={event_name}")
          print(f"MSK now={now_msk:%Y-%m-%d %H:%M:%S}")
          print(f"target_date={target_date}")
          print(f"target_rule={rule}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"WB_TARGET_DATE={target_date}\n")
              f.write(f"TARGET_DATE_RULE={rule}\n")
              f.write(f"SCHEDULE_LOCK_KEY=Служебные файлы/Ежедневное обновление данных/locks/daily_update_{target_date}.json\n")
          PY

      - name: Check schedule marker
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import boto3
          from botocore.exceptions import ClientError

          bucket = os.environ["YC_BUCKET_NAME"]
          key = os.environ["SCHEDULE_LOCK_KEY"]

          s3 = boto3.client(
              "s3",
              endpoint_url=os.getenv("YC_ENDPOINT_URL") or "https://storage.yandexcloud.net",
              aws_access_key_id=os.environ["YC_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["YC_SECRET_ACCESS_KEY"],
          )

          already_done = False
          try:
              s3.head_object(Bucket=bucket, Key=key)
              already_done = True
          except ClientError as exc:
              code = str(exc.response.get("Error", {}).get("Code", ""))
              if code not in {"404", "NoSuchKey", "NotFound"}:
                  raise

          print("=== Schedule marker check ===")
          print(f"target_date={os.environ['WB_TARGET_DATE']}")
          print(f"lock_key={key}")
          print(f"already_done={already_done}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"SCHEDULE_ALREADY_DONE={'true' if already_done else 'false'}\n")
          PY

      - name: Stop if schedule already completed
        if: github.event_name == 'schedule' && env.SCHEDULE_ALREADY_DONE == 'true'
        shell: bash
        run: |
          echo "Schedule уже успешно отработал для WB_TARGET_DATE=${WB_TARGET_DATE}: ${SCHEDULE_LOCK_KEY}"
          exit 0

      - name: Checkout diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "github.event_name=${{ github.event_name }}"
          echo "github.event.schedule=${{ github.event.schedule }}"
          echo "STORE_INPUT=${STORE_INPUT}"
          echo "WB_TARGET_DATE=${WB_TARGET_DATE}"
          echo "TARGET_DATE_RULE=${TARGET_DATE_RULE}"
          echo "UTC now=$(date -u '+%Y-%m-%d %H:%M:%S')"
          TZ=Europe/Moscow date '+MSK now=%Y-%m-%d %H:%M:%S'
          ls -la
          if [ ! -f "ezhednevnoe_obnovlenie_dannyh.py" ]; then
            echo "ERROR: ezhednevnoe_obnovlenie_dannyh.py not found in repo root"
            exit 2
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pandas openpyxl xlsxwriter requests boto3 python-dateutil numpy pytz

      - name: Load REPORT_ENV
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${REPORT_ENV:-}" ]; then
            echo "$REPORT_ENV" >> "$GITHUB_ENV"
          fi

      - name: Verify secrets
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          required = [
              "YC_ACCESS_KEY_ID",
              "YC_SECRET_ACCESS_KEY",
              "YC_BUCKET_NAME",
          ]
          store = os.environ.get("STORE_INPUT", "ALL").upper()
          if store in {"ALL", "TOPFACE"}:
              required.append("WB_PROMO_KEY_TOPFACE")
          if store in {"ALL", "MISSTAIS", "MT"}:
              required.append("WB_KEY_MISSTAIS")
          missing = [x for x in required if not os.getenv(x)]
          if missing:
              raise SystemExit("Missing env/secrets: " + ", ".join(missing))
          print("All required secrets are present.")
          PY

      - name: Validate Python syntax
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile ezhednevnoe_obnovlenie_dannyh.py

      - name: Run daily update
        shell: bash
        run: |
          set -euo pipefail
          echo "Running daily update for STORE_INPUT=${STORE_INPUT}, WB_TARGET_DATE=${WB_TARGET_DATE}"
          python ezhednevnoe_obnovlenie_dannyh.py --full --store "$STORE_INPUT"

      - name: Write schedule marker after success
        if: success() && github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import json
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          import boto3

          bucket = os.environ["YC_BUCKET_NAME"]
          key = os.environ["SCHEDULE_LOCK_KEY"]

          payload = {
              "workflow_version": "v29_every10m_target_date_rule_manual_ok",
              "target_date": os.environ.get("WB_TARGET_DATE"),
              "target_date_rule": os.environ.get("TARGET_DATE_RULE"),
              "store_input": os.environ.get("STORE_INPUT"),
              "github_run_id": os.environ.get("GITHUB_RUN_ID"),
              "github_run_number": os.environ.get("GITHUB_RUN_NUMBER"),
              "utc_completed_at": datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S"),
              "msk_completed_at": datetime.now(ZoneInfo("Europe/Moscow")).strftime("%Y-%m-%d %H:%M:%S"),
          }

          s3 = boto3.client(
              "s3",
              endpoint_url=os.getenv("YC_ENDPOINT_URL") or "https://storage.yandexcloud.net",
              aws_access_key_id=os.environ["YC_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["YC_SECRET_ACCESS_KEY"],
          )
          s3.put_object(
              Bucket=bucket,
              Key=key,
              Body=json.dumps(payload, ensure_ascii=False, indent=2).encode("utf-8"),
              ContentType="application/json",
          )
          print(f"Marker written: {key}")
          PY
